<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Projetos Elétricos - CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--primaria:#2563eb;--primaria-hover:#1d4ed8;--sucesso:#22c55e;--perigo:#ef4444;--aviso:#f59e0b;--bg:#f8fafc;--bg2:#fff;--bg3:#f1f5f9;--borda:#e2e8f0;--text:#1e293b;--text2:#64748b;--header-bg:#1e293b;--header-txt:#fff;--input-bg:#fff;--input-border:#cbd5e1}
.dark{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--borda:#334155;--text:#f1f5f9;--text2:#94a3b8;--header-bg:#020617;--input-bg:#1e293b;--input-border:#475569}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--text);transition:.3s}
#telaLogin{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--bg2);padding:40px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.1);width:100%;max-width:400px;text-align:center}
.login-box h1{font-size:24px;margin-bottom:8px}.login-box .sub{color:var(--text2);font-size:14px;margin-bottom:24px}
.login-box label{display:block;text-align:left;font-size:13px;margin-bottom:6px;font-weight:600}
.login-box input{width:100%;padding:12px;margin-bottom:16px;border:1px solid var(--input-border);border-radius:8px;background:var(--input-bg);color:var(--text)}
.login-box button{width:100%;padding:12px;background:var(--primaria);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:15px}
.login-box button:hover{background:var(--primaria-hover)}
.login-links{margin-top:16px;display:flex;justify-content:space-between;font-size:12px;color:var(--text2)}
.login-links label{display:inline;font-weight:400;cursor:pointer}
.login-erro{color:var(--perigo);font-size:13px;margin-top:12px;display:none}
.topo{height:56px;background:var(--header-bg);color:var(--header-txt);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:fixed;top:0;width:100%;z-index:100}
.topo-esq{display:flex;align-items:center;gap:12px}.logo{background:var(--primaria);padding:4px 8px;border-radius:6px;font-weight:800}
.topo-dir{display:flex;align-items:center;gap:8px}.topo-dir #userInfo{font-size:12px;opacity:.8}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--borda);position:fixed;top:56px;bottom:0;overflow-y:auto;z-index:50;transition:.3s}
.sidebar-item{padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2);font-weight:500;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--bg3);color:var(--text)}.sidebar-item.ativo{background:var(--bg3);color:var(--primaria);font-weight:700;border-left-color:var(--primaria)}
.conteudo{margin-left:240px;padding:24px;margin-top:56px;min-height:calc(100vh - 56px)}
.titulo-pag{font-size:22px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.cartoes{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.cartao{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--borda)}
.cartao .rotulo{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.cartao .valor{font-size:24px;font-weight:800}.cartao .sub{font-size:12px;color:var(--text2);margin-top:4px}
.tabela-wrap{background:var(--bg2);border-radius:12px;border:1px solid var(--borda);margin-bottom:20px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg3);padding:12px 16px;text-align:left;color:var(--text2);font-weight:600;position:sticky;top:0}
td{padding:12px 16px;border-top:1px solid var(--borda)}tr:hover{background:rgba(0,0,0,.02)}
.dark tr:hover{background:rgba(255,255,255,.02)}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:.2s}
.btn-primary{background:var(--primaria);color:#fff}.btn-primary:hover{background:var(--primaria-hover)}
.btn-success{background:var(--sucesso);color:#fff}.btn-success:hover{background:#16a34a}
.btn-outline{background:transparent;border:1px solid var(--borda);color:var(--text)}.btn-outline:hover{background:var(--bg3)}
.btn-icone{background:none;border:none;cursor:pointer;font-size:16px;padding:4px}.btn-icone:hover{opacity:.7}
.filtro-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:flex-end;background:var(--bg2);padding:16px;border-radius:12px;border:1px solid var(--borda)}
.grupo{display:flex;flex-direction:column;gap:4px}
.grupo label{font-size:12px;font-weight:600;color:var(--text2)}
.grupo input,.grupo select,.grupo textarea{padding:10px;border-radius:8px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text);font-size:13px}
.edita-input{padding:6px 8px;border-radius:4px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text);font-size:12px}
.edita-select{padding:6px 8px;border-radius:4px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text);font-size:12px}
.kanban-board{display:flex;gap:16px;overflow-x:auto;padding-bottom:20px;align-items:flex-start}
.kanban-col{min-width:280px;max-width:320px;flex-shrink:0;background:var(--bg3);border-radius:12px;padding:12px}
.kanban-col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:700;font-size:13px}
.kanban-col-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
.kanban-col-count{background:var(--bg2);padding:2px 10px;border-radius:20px;font-size:12px;color:var(--text2)}
.kanban-cards{min-height:60px}
.kanban-card{background:var(--bg2);padding:12px;border-radius:8px;margin-bottom:8px;cursor:pointer;border:1px solid var(--borda);transition:.2s}
.kanban-card:hover{border-color:var(--primaria);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.kanban-card-title{font-weight:700;font-size:13px;margin-bottom:4px}.kanban-card-info{font-size:11px;color:var(--text2);margin-bottom:4px}
.kanban-card-valor{font-size:13px;font-weight:700;color:var(--primaria)}.kanban-card-sub{font-size:11px;color:var(--text2)}
.kanban-card-anexos{font-size:10px;color:var(--text2);margin-top:4px}.kanban-card.dragging{opacity:.5}
.kanban-dropzone{text-align:center;padding:20px;color:var(--text2);font-size:12px;border:2px dashed var(--borda);border-radius:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-overlay.show{display:flex}.modal{background:var(--bg2);padding:24px;border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;position:relative}
.modal h2{font-size:18px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.flut-direita{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:10px}
.dash-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.dash-toggle{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:8px}
.dash-toggle button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;background:transparent;color:var(--text2);transition:.2s}
.dash-toggle button.ativo{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{padding:20px;border-radius:12px;border:1px solid var(--borda);background:var(--bg2);position:relative}
.kpi-label{font-size:12px;color:var(--text2);text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.kpi-value{font-size:24px;font-weight:800;margin:8px 0}.kpi-growth{font-size:11px}
.kpi-growth.up{color:var(--sucesso)}.kpi-growth.down{color:var(--perigo)}.kpi-spark{width:100%;height:40px;margin-top:8px}
.dash-main{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.dash-chart-box{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--borda)}
.dash-chart-box h3{font-size:14px;font-weight:700;margin-bottom:4px}.dash-chart-box .desc{font-size:11px;color:var(--text2);margin-bottom:12px}
.dash-chart-box canvas{max-height:260px!important}
.indicadores-box{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--borda)}
.indicadores-box h3{font-size:14px;font-weight:700;margin-bottom:12px}
.ind-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg3);font-size:12px}
.ind-item:last-child{border-bottom:none}.ind-label{color:var(--text2)}.ind-val{font-weight:700}
.ind-tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-left:6px}
.ind-tag.ok{background:rgba(34,197,94,.15);color:#22c55e}.ind-tag.medio{background:rgba(245,158,11,.15);color:#f59e0b}
.ind-tag.baixo{background:rgba(239,68,68,.15);color:#ef4444}
.dash-bottom{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.dash-cat-box{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--borda)}
.dash-cat-box h3{font-size:14px;font-weight:700;margin-bottom:12px}
.cat-bar-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.cat-info{display:flex;justify-content:space-between;font-size:12px}
.cat-nome{color:var(--text2)}.cat-val{font-weight:700}
.cat-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.donut-center{position:relative;width:160px;margin:0 auto}
.donut-total{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-total .val{font-size:28px;font-weight:800}.donut-total .lbl{font-size:11px;color:var(--text2)}
.donut-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center}
.dl-item{display:flex;align-items:center;gap:6px;font-size:11px}
.dl-dot{width:8px;height:8px;border-radius:50%;display:inline-block}.dl-pct{color:var(--text2);margin-left:4px}
.grafico-card{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--borda);margin-bottom:16px}
.grafico-card h3{font-size:14px;font-weight:700;margin-bottom:12px}.grafico-card canvas{max-height:200px!important}
.barra-abas{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.barra-abas button{padding:8px 14px;border:1px solid var(--borda);border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:var(--bg3);color:var(--text2);transition:.2s}
.barra-abas button.ativo{background:var(--primaria);color:#fff;border-color:var(--primaria)}
.linha-graficos{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.estq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.estq-item{background:var(--bg2);padding:12px;border-radius:10px;border:1px solid var(--borda);text-align:center}
.estq-item .nome{font-weight:700;font-size:13px}.estq-item .info{font-size:11px;color:var(--text2);margin:4px 0}
.estq-item .qtd{font-size:22px;font-weight:800;margin:6px 0}
.estq-item .qtd.critico{color:var(--perigo)}.estq-item .qtd.baixo{color:var(--aviso)}.estq-item .qtd.ok{color:var(--sucesso)}
.orc-tema input,.orc-tema select,.orc-tema textarea{color:#fff;background:#1a2332;border-color:#2d3a4e}
.orc-nav{display:flex;gap:4px;margin-bottom:16px}
.orc-nav span{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);background:rgba(255,255,255,.05)}
.orc-nav span.ativo{background:var(--primaria);color:#fff}
.link-cell{display:flex;align-items:center;gap:4px}.link-cell a{text-decoration:none;font-size:16px}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-container{animation:slideIn .3s ease;position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);color:#fff}
canvas#grafEvolucao{max-height:260px!important;width:100%!important}
canvas#grafDonutStatus{max-height:180px!important;width:160px!important;margin:0 auto;display:block}
canvas#grafToggle{max-height:220px!important;width:100%!important}
canvas.kpi-spark{max-height:40px!important;width:100%!important}
canvas#grafStatus{max-height:200px!important}canvas#grafLeadsMes{max-height:200px!important}canvas#grafLeadsStatus{max-height:200px!important}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49;display:none}.sidebar-overlay.show{display:block}
.conteudo{margin-left:0;padding:16px}.form-grid{grid-template-columns:1fr}
.dash-main,.dash-bottom,.linha-graficos{grid-template-columns:1fr}.kanban-col{min-width:260px}}
</style>
</head>
<body>

<div id="telaLogin">
<div class="login-box">
<div style="background:var(--primaria);color:#fff;width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;margin:0 auto 16px">SF</div>
<h1>CRM SF Projetos Elétricos</h1>
<p class="sub">Faça login para continuar</p>
<label>Usuário</label><input type="text" id="loginUser" placeholder="Seu usuário">
<label>Senha</label><input type="password" id="loginPass" placeholder="••••••••">
<button onclick="logar()">Entrar no Sistema</button>
<div class="login-erro" id="loginErro">Usuário ou senha inválidos.</div>
<div class="login-links"><label><input type="checkbox" id="rememberMe"> Lembrar login</label></div>
</div></div>

<div id="app" style="display:none">
<div class="topo">
<div class="topo-esq"><span class="logo">SF</span><h2 style="font-size:16px">CRM Projetos Elétricos</h2></div>
<div class="topo-dir"><span id="userInfo"></span><button class="btn-icone" id="btnTema" onclick="altTema()">🌙</button><button class="btn-icone" onclick="sair()">🚪</button></div>
</div>
<div class="sidebar" id="sidebar"></div>
<div class="conteudo" id="conteudo"></div>
</div>

<!-- MODAIS -->
<div class="modal-overlay" id="modalLead"><div class="modal">
<button class="flut-direita" onclick="fecharModalLead()">✕</button><h2 id="tituloModalLead">👤 Novo Lead</h2>
<div class="form-grid">
<div class="grupo"><label>Nome</label><input id="fLeadNome"></div>
<div class="grupo"><label>Telefone</label><input id="fLeadTel"></div>
<div class="grupo"><label>Cidade</label><input id="fLeadCidade"></div>
<div class="grupo"><label>Origem</label><select id="fLeadOrigem"><option>Indicação</option><option>Instagram</option><option>WhatsApp</option><option>Site</option><option>Orçamento</option></select></div>
<div class="grupo"><label>Valor</label><input id="fLeadValor" value="R$ 0,00" onfocus="valorFocus(this)" onblur="valorBlur(this)"></div>
<div class="grupo"><label>Vendedor</label><select id="fLeadVendedor"><option>João</option><option>Bruno</option><option>Vinicius</option><option>Sistema</option></select></div>
<div class="grupo" style="grid-column:span 2"><label>Link Orçamento</label><input id="fLeadLink" placeholder="https://..."></div>
<div class="grupo" style="grid-column:span 2"><label>Observações</label><textarea id="fLeadObs" rows="2"></textarea></div>
</div>
<button class="btn btn-primary" onclick="salvarLeadModal()">💾 Salvar Lead</button>
</div></div>

<div class="modal-overlay" id="modalGasto"><div class="modal">
<button class="flut-direita" onclick="fecharModalGasto()">✕</button><h2>💰 Confirmar Venda</h2><p id="infoGasto" style="font-size:13px;color:var(--text2);margin-bottom:14px"></p>
<div class="form-grid">
<div class="grupo"><label>Cliente</label><input id="gastoCliente" readonly></div>
<div class="grupo"><label>Valor</label><input id="gastoValor" onfocus="valorFocus(this)" onblur="valorBlur(this)"></div>
<div class="grupo"><label>Gasto</label><input id="gastoGasto" value="R$ 0,00" onfocus="valorFocus(this)" onblur="valorBlur(this)"></div>
<div class="grupo"><label>Empresa</label><select id="gastoEmpresa"><option>SF</option><option>SPAZZIO</option><option>BRANCO</option><option>ÉTHOS</option><option>SOLAR FORCE</option><option>TAQUARI</option></select></div>
<div class="grupo"><label>Potência</label><input id="gastoPotencia" placeholder="Ex: 5kWp"></div>
</div>
<button class="btn btn-success" onclick="confirmarVenda()">✅ Confirmar Venda</button>
</div></div>

<div class="modal-overlay" id="modalEmpresa"><div class="modal">
<button class="flut-direita" onclick="fecharModalEmp()">✕</button><h2 id="tituloModalEmp">🏢 Nova Empresa</h2>
<div class="form-grid">
<div class="grupo"><label>CNPJ</label><input id="empCnpj"></div>
<div class="grupo"><label>Razão Social *</label><input id="empRazao"></div>
<div class="grupo"><label>Nome Fantasia</label><input id="empFantasia"></div>
<div class="grupo"><label>Telefone</label><input id="empTel"></div>
<div class="grupo"><label>Endereço</label><input id="empEnd"></div>
<div class="grupo"><label>Cidade</label><input id="empCidade"></div>
<div class="grupo"><label>UF</label><input id="empEstado" maxlength="2"></div>
<div class="grupo"><label>CEP</label><input id="empCep"></div>
<div class="grupo"><label>E-mail</label><input id="empEmail"></div>
</div>
<button class="btn btn-primary" onclick="salvarModalEmp()">💾 Salvar Empresa</button>
</div></div>

<div class="modal-overlay" id="modalProjeto"><div class="modal" style="width:640px;max-width:100%">
<button class="flut-direita" onclick="fecharModalProj()">✕</button><h2 id="tituloModalProj">📝 Novo Projeto</h2>
<div class="form-grid">
<div class="grupo" style="grid-column:span 2"><label>Cliente *</label><input id="mpCliente"></div>
<div class="grupo"><label>Empresa</label><select id="mpEmpresa"></select></div>
<div class="grupo"><label>Data</label><input id="mpData"></div>
<div class="grupo"><label>Status</label><select id="mpStatus"></select></div>
<div class="grupo"><label>Potência (kWp)</label><input id="mpPotencia" oninput="calcPotenciaValor()"></div>
<div class="grupo"><label>Valor</label><input id="mpValor" readonly></div>
<div class="grupo"><label>TRT</label><input id="mpTrt" readonly></div>
<div class="grupo"><label>Pago</label><select id="mpPago"><option>NÃO</option><option>SIM</option></select></div></div>
<div id="mpPotenciaFeedback" style="font-size:12px;margin-bottom:8px"></div>
<div style="border-top:1px solid var(--borda);padding-top:12px;margin-top:8px">
<div style="margin-bottom:8px"><label style="font-size:12px;font-weight:600">📎 Documentos</label><input type="file" id="mpDocInput" multiple style="font-size:12px;margin-left:8px"></div>
<div id="mpDocsList" style="margin-bottom:8px"></div>
<div style="margin-bottom:8px"><label style="font-size:12px;font-weight:600">📷 Fotos</label><input type="file" id="mpFotoInput" multiple accept="image/*" style="font-size:12px;margin-left:8px"></div>
<div id="mpFotosList" style="margin-bottom:8px"></div></div>
<div id="mpMsg" style="font-size:13px;margin-bottom:8px"></div>
<div style="display:flex;gap:8px;justify-content:space-between">
<button class="btn btn-outline" id="mpBtnDel" onclick="excluirModalProj()" style="color:var(--perigo);display:none">🗑️ Excluir</button>
<div style="display:flex;gap:8px"><button class="btn btn-outline" onclick="limparModalProj()">🔄 Limpar</button><button class="btn btn-primary" onclick="salvarModalProj()">💾 Salvar</button></div></div>
</div></div>

<div class="modal-overlay" id="modalEstoque"><div class="modal">
<button class="flut-direita" onclick="fecharModalEstoque()">✕</button><h2>📦 Item Estoque</h2>
<div class="form-grid">

<script>

// Toast
function toast(msg,tipo){
  var e=document.querySelector('.toast-container');if(e)e.remove();
  var el=document.createElement('div');el.className='toast-container';
  el.style.background=tipo==='erro'?'#ef4444':tipo==='aviso'?'#f59e0b':'#22c55e';
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .3s'},2500);
  setTimeout(function(){el.remove()},3000);
}

// Debounce
function debounce(fn,ms){var t;return function(){clearTimeout(t);t=setTimeout(fn,ms)}}

// Cache TTL
async function get(t){
  var agora=Date.now();
  if(cache[t]&&cacheTTL[t]&&(agora-cacheTTL[t]<30000))return cache[t];
  try{
    var r=await sb.from(t).select('*').order('id',{ascending:false});
    if(r.error){console.error(r.error.message);if(cache[t])return cache[t];return[]}
    cache[t]=r.data||[];cacheTTL[t]=agora;return cache[t];
  }catch(e){if(cache[t])return cache[t];return[]}
}
function limparCache(){cache={};cacheTTL={}}
async function ins(t,d){cache[t]=null;var r=await sb.from(t).insert(d).select();return r.data||null}
async function upd(t,i,d){cache[t]=null;var r=await sb.from(t).update(d).eq('id',i);return !r.error}
async function del(t,i){cache[t]=null;var r=await sb.from(t).delete().eq('id',i);return !r.error}

// Utilitários
function fmtNum(v){return(Number(v)||0).toFixed(2).replace('.',',')}
function parseMon(s){if(!s)return 0;return parseFloat(String(s).replace(/[R$\s.]/g,'').replace(',','.'))||0}
function hoje(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()}
function meses(){return['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']}
function valorFocus(el){if(!el)return;el.value=el.value.replace(/[R$\s.]/g,'').replace(',','.')}
function valorBlur(el){if(!el)return;var v=el.value.replace(/[R$\s.]/g,'').replace(',','.');var n=parseFloat(v)||0;el.value='R$ '+fmtNum(n)}
function altTema(){document.body.classList.toggle('dark');document.getElementById('btnTema').textContent=document.body.classList.contains('dark')?'☀️':'🌙';localStorage.setItem('tema',document.body.classList.contains('dark')?'dark':'light')}

function calcularValorPorPotencia(potStr){
  if(!potStr)return{valor:'R$ 0,00',trt:'R$ 70,00'};
  var pot=parseFloat(String(potStr).replace(/[kKwWpP]/g,'').replace(',','.'))||0;
  if(pot>0&&pot<=7.5)return{valor:'R$ 370,00',trt:'R$ 70,00'};
  if(pot>7.5&&pot<=20)return{valor:'R$ 500,00',trt:'R$ 70,00'};
  if(pot>20&&pot<=75)return{valor:'R$ 900,00',trt:'R$ 70,00'};
  if(pot>75)return{valor:'R$ 900,00',trt:'R$ 70,00'};
  return{valor:'R$ 0,00',trt:'R$ 70,00'};
}

// Login
async function logar(){
  var u=document.getElementById('loginUser').value.trim();
  var p=document.getElementById('loginPass').value.trim();
  if(!u||!p){toast('Preencha os campos','aviso');return}
  try{
    var r=await sb.from('usuarios').select('*').eq('usuario',u).eq('senha',p).maybeSingle();
    if(r.data){usuarioAtual=r.data;document.getElementById('telaLogin').style.display='none';document.getElementById('app').style.display='block';
      document.getElementById('loginErro').style.display='none';
      document.getElementById('userInfo').textContent=r.data.funcao+(r.data.empresa?' - '+r.data.empresa:'');
      if(document.getElementById('rememberMe').checked)localStorage.setItem('crm_user',JSON.stringify({user:u,pass:p}));else localStorage.removeItem('crm_user');
      if(localStorage.getItem('tema')=='dark'){document.body.classList.add('dark');document.getElementById('btnTema').textContent='☀️'}
      montarSidebar();
      if(r.data.funcao=='Empresa')pagProjetos();else pagDashboard();
      toast('Bem-vindo, '+r.data.nome+'!','sucesso');
    }else{document.getElementById('loginErro').textContent='Usuário ou senha inválidos';document.getElementById('loginErro').style.display='block'}
  }catch(e){document.getElementById('loginErro').textContent='Erro: '+e.message;document.getElementById('loginErro').style.display='block'}
}
function sair(){document.getElementById('app').style.display='none';document.getElementById('telaLogin').style.display='flex';document.getElementById('loginPass').value='';localStorage.removeItem('crm_user')}
async function autoLogin(){try{var r=localStorage.getItem('crm_user');if(!r)return;var d=JSON.parse(r);document.getElementById('loginUser').value=d.user;document.getElementById('loginPass').value=d.pass;document.getElementById('rememberMe').checked=true;await logar()}catch(e){}}

// Sidebar
function montarSidebar(){
  var mapa={Administrador:['dashboard','leads','vendas','gastos','projetos','empresas','orcamentos','estoque','config'],Financeiro:['dashboard','leads','vendas','gastos','projetos','empresas','orcamentos','estoque'],Vendedor:['dashboard','leads','orcamentos'],Empresa:['dashboard','projetos']};
  var rot={dashboard:'📊 Dashboard',leads:'👥 Leads',vendas:'💰 Vendas',gastos:'🧾 Gastos',projetos:'🔬 Projetos',empresas:'🏢 Empresas',orcamentos:'📋 Orçamentos',estoque:'📦 Estoque',config:'⚙️ Config'};
  var pg=mapa[usuarioAtual.funcao]||['dashboard'];
  var s=document.getElementById('sidebar');s.innerHTML='';
  for(var i=0;i<pg.length;i++){
    var d=document.createElement('div');d.className='sidebar-item'+(i===0?' ativo':'');
    d.dataset.page=pg[i];d.innerHTML='<span>'+rot[pg[i]]+'</span>';
    d.onclick=function(p){return function(){ir(p);if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open')}}}(pg[i]);
    s.appendChild(d)}
}
function ir(pg){
  document.querySelectorAll('.sidebar-item').forEach(function(i){i.classList.remove('ativo')});
  var el=document.querySelector('.sidebar-item[data-page="'+pg+'"]');if(el)el.classList.add('ativo');
  var fn=window['pag'+pg.charAt(0).toUpperCase()+pg.slice(1)];if(fn)fn()
}

// === DASHBOARD ===
async function pagDashboard(){
  var c=document.getElementById('conteudo');
  c.innerHTML='<div class="titulo-pag">📊 Dashboard</div><div class="kpi-row" id="kpiRow"></div><div class="dash-main"><div class="dash-chart-box"><h3>📈 Evolução Financeira</h3><canvas id="grafEvolucao"></canvas></div><div class="indicadores-box"><h3>📊 Indicadores</h3><div id="indicadoresList"></div></div></div>';
  try{
    _allLeads=await get('leads');_allVendas=await get('vendas');_allProjetos=await get('projetos');_allEstoque=await get('estoque');_allOrcamentos=await get('orcamentos');
    var rec=_allVendas.reduce(function(s,v){return s+parseMon(v.valor)},0);
    var gast=_allVendas.reduce(function(s,v){return s+parseMon(v.gasto)},0);
    var lucro=rec-gast;
    document.getElementById('kpiRow').innerHTML=
      '<div class="kpi-card"><div class="kpi-label">Faturado</div><div class="kpi-value">R$ '+fmtNum(rec)+'</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">Custos</div><div class="kpi-value">R$ '+fmtNum(gast)+'</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">Resultado</div><div class="kpi-value" style="color:'+(lucro>=0?'var(--sucesso)':'var(--perigo)')+'">R$ '+fmtNum(lucro)+'</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">Leads</div><div class="kpi-value">'+_allLeads.length+'</div></div>';
    document.getElementById('indicadoresList').innerHTML=
      '<div class="ind-item"><span class="ind-label">Vendas</span><span class="ind-val">'+_allVendas.length+'</span></div>'+
      '<div class="ind-item"><span class="ind-label">Projetos</span><span class="ind-val">'+_allProjetos.length+'</span></div>'+
      '<div class="ind-item"><span class="ind-label">Estoque</span><span class="ind-val">'+_allEstoque.length+' itens</span></div>';
    renderGrafico();
  }catch(e){}
}
function renderGrafico(){
  setTimeout(function(){
    try{
      if(window._gev)window._gev.destroy();
      var cv=document.getElementById('grafEvolucao');
      if(cv&&window.Chart){
        var v=_allVendas||[];
        window._gev=new Chart(cv,{type:'line',data:{labels:meses(),datasets:[{label:'Faturamento',data:[0,0,0,0,0,v.reduce(function(s,x){return s+parseMon(x.valor)},0)],borderColor:'#3b82f6',tension:.3,fill:true}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}})
      }
    }catch(e){}
  },200)
}

// === LEADS ===
async function pagLeads(){
  if(!['Administrador','Financeiro','Vendedor'].includes(usuarioAtual.funcao)){document.getElementById('conteudo').innerHTML='<div class="titulo-pag">👥 Leads</div><p>Acesso negado</p>';return}
  _allLeads=await get('leads');
  var h='<div class="titulo-pag">👥 Leads</div><div class="filtro-bar"><div class="grupo"><label>Busca</label><input id="fLeadBusca" placeholder="Nome..." oninput="flLeads()"></div></div><button class="btn btn-primary" onclick="abrirModalLead()" style="margin-bottom:12px">+ Novo Lead</button><div class="tabela-wrap"><table><thead><tr><th>Nome</th><th>Cidade</th><th>Valor</th><th>Andamento</th><th>Ações</th></tr></thead><tbody id="leadBody"></tbody></table></div>';
  document.getElementById('conteudo').innerHTML=h;
  flLeads();
}
function flLeads(){
  var b=(document.getElementById('fLeadBusca')?document.getElementById('fLeadBusca').value.toLowerCase():'');
  var d=_allLeads;if(b)d=d.filter(function(l){return(l.nome||'').toLowerCase().includes(b)});
  var h='';
  for(var i=0;i<d.length;i++){
    h+='<tr><td>'+d[i].nome+'</td><td>'+(d[i].cidade||'')+'</td><td>'+d[i].valor+'</td><td>'+d[i].andamento+'</td><td><button class="btn-icone" onclick="abrirModalLead('+i+')">✏️</button></td></tr>'
  }
  if(!d.length)h+='<tr><td colspan="5" style="text-align:center;padding:30px">Nenhum</td></tr>';
  document.getElementById('leadBody').innerHTML=h;
}
var debounceFLeads=debounce(flLeads,300);
function abrirModalLead(i){idxEditLead=i;document.getElementById('modalLead').classList.add('show')}
function fecharModalLead(){document.getElementById('modalLead').classList.remove('show');idxEditLead=null}
async function salvarLeadModal(){

  await ins('leads',d);fecharModalLead();pagLeads();toast('Lead criado!','sucesso');

// === PROJETOS ===
async function pagProjetos(){
  _allProjetos=await get('projetos');
  var h='<div class="titulo-pag">🔬 Projetos</div><button class="btn btn-primary" onclick="abrirModalProj()" style="margin-bottom:12px">+ Novo Projeto</button><div class="kanban-board" id="kanbanBoard"></div>';
  document.getElementById('conteudo').innerHTML=h;
  renderKanban();
}
function renderKanban(){
  var b=document.getElementById('kanbanBoard');if(!b)return;b.innerHTML='';
  KANBAN_FASES.forEach(function(st){
    var p=(_allProjetos||[]).filter(function(x){return(x.status||'Recebido')===st.nome});
    var col=document.createElement('div');col.className='kanban-col';
    col.innerHTML='<div class="kanban-col-header"><span>'+st.icone+' '+st.nome+'</span><span class="kanban-col-count">'+p.length+'</span></div>';
    p.forEach(function(x){
      col.innerHTML+='<div class="kanban-card"><div class="kanban-card-title">'+x.cliente+'</div><div class="kanban-card-info">'+(x.empresa||'')+'</div></div>'
    });
    b.appendChild(col);
  })
}
function abrirModalProj(){
  var c=prompt('Nome do cliente:');if(!c)return;
  var p=prompt('Potência (kWp):','');var v='R$ 0,00',t='R$ 70,00';
  if(p){var r=calcularValorPorPotencia(p);v=r.valor;t=r.trt}
  ins('projetos',{cliente:c,potencia:p||'',valor:v,trt:t,data:hoje(),status:'Recebido',pago:'NÃO'}).then(function(){toast('Projeto criado!','sucesso');pagProjetos()})
}

function renderFasesList(){
  var c=document.getElementById('fasesList');c.innerHTML='';
  for(var i=0;i<KANBAN_FASES.length;i++){
    var f=KANBAN_FASES[i];
    var div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:6px;background:var(--bg3);padding:8px 10px;border-radius:8px;margin-bottom:4px;flex-wrap:wrap';

    var sp=document.createElement('span');sp.style.cssText='width:22px;text-align:center;font-size:18px';sp.textContent=f.icone;

    var inpNome=document.createElement('input');inpNome.value=f.nome;
    inpNome.style.cssText='flex:1;min-width:80px;padding:5px 8px;border:1px solid var(--input-border);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:12px';
    (function(idx){inpNome.onchange=function(){KANBAN_FASES[idx].nome=this.value}})(i);

    var inpCor=document.createElement('input');inpCor.type='color';inpCor.value=f.cor;
    inpCor.style.cssText='width:30px;height:28px;border:1px solid var(--input-border);border-radius:4px;cursor:pointer;background:transparent';
    (function(idx){inpCor.onchange=function(){KANBAN_FASES[idx].cor=this.value}})(i);

    var bC=document.createElement('button');bC.textContent='↑';
    bC.disabled=(i===0);
    bC.style.cssText='background:none;border:1px solid var(--borda);border-radius:4px;cursor:pointer;padding:2px 6px;font-size:12px;color:var(--text2);opacity:'+(i===0?'.4':'1');
    (function(idx){bC.onclick=function(){moverFase(idx,-1)}})(i);

    var bB=document.createElement('button');bB.textContent='↓';
    bB.disabled=(i===KANBAN_FASES.length-1);
    bB.style.cssText='background:none;border:1px solid var(--borda);border-radius:4px;cursor:pointer;padding:2px 6px;font-size:12px;color:var(--text2);opacity:'+(i===KANBAN_FASES.length-1?'.4':'1');
    (function(idx){bB.onclick=function(){moverFase(idx,1)}})(i);

    var bD=document.createElement('button');bD.textContent='🗑️';
    bD.style.cssText='background:none;border:none;cursor:pointer;color:var(--perigo);font-size:14px;padding:2px';
    (function(idx){bD.onclick=function(){delFase(idx)}})(i);

    div.appendChild(sp);div.appendChild(inpNome);div.appendChild(inpCor);div.appendChild(bC);div.appendChild(bB);div.appendChild(bD);
    c.appendChild(div);
  }
}
function addFase(){
  var nome=document.getElementById('novaFaseNome').value.trim();if(!nome){document.getElementById('faseMsg').textContent='Informe o nome';return}
  var cor=document.getElementById('novaFaseCor').value;var icone=document.getElementById('novaFaseIcone').value.trim()||'📋';
  KANBAN_FASES.push({nome:nome,cor:cor,icone:icone});
  document.getElementById('novaFaseNome').value='';renderFasesList();document.getElementById('faseMsg').textContent='';
}
function moverFase(i,dir){
  var j=i+dir;if(j<0||j>=KANBAN_FASES.length)return;
  var tmp=KANBAN_FASES[i];KANBAN_FASES[i]=KANBAN_FASES[j];KANBAN_FASES[j]=tmp;renderFasesList()
}
function delFase(i){
  if(!confirm('Remover "'+KANBAN_FASES[i].nome+'"?'))return;KANBAN_FASES.splice(i,1);renderFasesList()
}
async function salvarEFechaFases(){
  STATUS_CORES={};STATUS_ICONES={};
  KANBAN_FASES.forEach(function(f){STATUS_CORES[f.nome]=f.cor;STATUS_ICONES[f.nome]=f.icone});
  try{
    await sb.from('fases').delete().neq('id',0);
    for(var i=0;i<KANBAN_FASES.length;i++)await sb.from('fases').insert({nome:KANBAN_FASES[i].nome,cor:KANBAN_FASES[i].cor,icone:KANBAN_FASES[i].icone,ordem:i});
  }catch(e){localStorage.setItem('kanban_fases',JSON.stringify(KANBAN_FASES))}
  document.getElementById('faseMsg').textContent='✅ Salvas!';document.getElementById('faseMsg').style.color='var(--sucesso)';
  setTimeout(function(){fecharModalFases();pagProjetos()},500)
}

// Init
document.addEventListener('DOMContentLoaded',function(){
  if(localStorage.getItem('tema')=='dark'){document.body.classList.add('dark');document.getElementById('btnTema').textContent='☀️'}
  autoLogin();
});
</script>
