<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Projetos Elétricos - CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--primaria:#2563eb;--primaria-hover:#1d4ed8;--sucesso:#22c55e;--perigo:#ef4444;--aviso:#f59e0b;--bg:#f8fafc;--bg2:#fff;--bg3:#f1f5f9;--borda:#e2e8f0;--text:#1e293b;--text2:#64748b;--header-bg:#1e293b;--header-txt:#fff;--input-bg:#fff;--input-border:#cbd5e1}
.dark{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--borda:#334155;--text:#f1f5f9;--text2:#94a3b8;--header-bg:#020617;--input-bg:#1e293b;--input-border:#475569}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--text);transition:.3s}
#telaLogin{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--bg2);padding:40px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.1);width:100%;max-width:400px;text-align:center}
.login-box h1{font-size:24px;margin-bottom:8px}
.login-box .sub{color:var(--text2);font-size:14px;margin-bottom:24px}
.login-box label{display:block;text-align:left;font-size:13px;margin-bottom:6px;font-weight:600}
.login-box input{width:100%;padding:12px;margin-bottom:16px;border:1px solid var(--input-border);border-radius:8px;background:var(--input-bg);color:var(--text)}
.login-box button{width:100%;padding:12px;background:var(--primaria);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:15px}
.login-box button:hover{background:var(--primaria-hover)}
.login-links{margin-top:16px;display:flex;justify-content:space-between;font-size:12px;color:var(--text2)}
.login-links label{display:inline;font-weight:400;cursor:pointer}
.login-erro{color:var(--perigo);font-size:13px;margin-top:12px;display:none}
.topo{height:56px;background:var(--header-bg);color:var(--header-txt);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:fixed;top:0;width:100%;z-index:100}
.topo-esq{display:flex;align-items:center;gap:12px}
.logo{background:var(--primaria);padding:4px 8px;border-radius:6px;font-weight:800}
.topo-dir{display:flex;align-items:center;gap:8px}
.topo-dir #userInfo{font-size:12px;opacity:.8}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--borda);position:fixed;top:56px;bottom:0;overflow-y:auto;z-index:50;transition:.3s}
.sidebar-item{padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2);font-weight:500;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--bg3);color:var(--text)}
.sidebar-item.ativo{background:var(--bg3);color:var(--primaria);font-weight:700;border-left-color:var(--primaria)}
.conteudo{margin-left:240px;padding:24px;margin-top:56px;min-height:calc(100vh - 56px)}
.titulo-pag{font-size:22px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.cartoes{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.cartao{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--borda)}
.cartao .rotulo{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.cartao .valor{font-size:24px;font-weight:800}
.cartao .sub{font-size:12px;color:var(--text2);margin-top:4px}
.tabela-wrap{background:var(--bg2);border-radius:12px;border:1px solid var(--borda);margin-bottom:20px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg3);padding:12px 16px;text-align:left;color:var(--text2);font-weight:600;position:sticky;top:0}
td{padding:12px 16px;border-top:1px solid var(--borda)}
tr:hover{background:rgba(0,0,0,.02)}
.dark tr:hover{background:rgba(255,255,255,.02)}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:.2s}
.btn-primary{background:var(--primaria);color:#fff}
.btn-primary:hover{background:var(--primaria-hover)}
.btn-success{background:var(--sucesso);color:#fff}
.btn-success:hover{background:#16a34a}
.btn-outline{background:transparent;border:1px solid var(--borda);color:var(--text)}
.btn-outline:hover{background:var(--bg3)}
.btn-icone{background:none;border:none;cursor:pointer;font-size:16px;padding:4px}
.btn-icone:hover{opacity:.7}
.filtro-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:flex-end;background:var(--bg2);padding:16px;border-radius:12px;border:1px solid var(--borda)}
.grupo{display:flex;flex-direction:column;gap:4px}
.grupo label{font-size:12px;font-weight:600;color:var(--text2)}
.grupo input,.grupo select,.grupo textarea{padding:10px;border-radius:8px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text);font-size:13px}
.edita-input{padding:6px 8px;border-radius:4px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text);font-size:12px}
.edita-select{padding:6px 8px;border-radius:4px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text);font-size:12px}
.kanban-board{display:flex;gap:16px;overflow-x:auto;padding-bottom:20px;align-items:flex-start}
.kanban-col{min-width:280px;max-width:320px;flex-shrink:0;background:var(--bg3);border-radius:12px;padding:12px}
.kanban-col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:700;font-size:13px}
.kanban-col-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
.kanban-col-count{background:var(--bg2);padding:2px 10px;border-radius:20px;font-size:12px;color:var(--text2)}
.kanban-cards{min-height:60px}
.kanban-card{background:var(--bg2);padding:12px;border-radius:8px;margin-bottom:8px;cursor:pointer;border:1px solid var(--borda);transition:.2s}
.kanban-card:hover{border-color:var(--primaria);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.kanban-card-title{font-weight:700;font-size:13px;margin-bottom:4px}
.kanban-card-info{font-size:11px;color:var(--text2);margin-bottom:4px}
.kanban-card-valor{font-size:13px;font-weight:700;color:var(--primaria)}
.kanban-card-sub{font-size:11px;color:var(--text2)}
.kanban-card-anexos{font-size:10px;color:var(--text2);margin-top:4px}
.kanban-card.dragging{opacity:.5}
.kanban-dropzone{text-align:center;padding:20px;color:var(--text2);font-size:12px;border:2px dashed var(--borda);border-radius:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);padding:24px;border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;position:relative}
.modal h2{font-size:18px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.flut-direita{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:10px}
.dash-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.dash-toggle{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:8px}
.dash-toggle button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;background:transparent;color:var(--text2);transition:.2s}
.dash-toggle button.ativo{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{padding:20px;border-radius:12px;border:1px solid var(--borda);background:var(--bg2);position:relative}
.kpi-label{font-size:12px;color:var(--text2);text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.kpi-value{font-size:24px;font-weight:800;margin:8px 0}
.kpi-growth{font-size:11px}
.kpi-growth.up{color:var(--sucesso)}
.kpi-growth.down{color:var(--perigo)}
.kpi-spark{width:100%;height:40px;margin-top:8px}
.dash-main{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.dash-chart-box{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--borda)}
.dash-chart-box h3{font-size:14px;font-weight:700;margin-bottom:4px}
.dash-chart-box .desc{font-size:11px;color:var(--text2);margin-bottom:12px}
.dash-chart-box canvas{max-height:260px!important}
.dash-chart-legend{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.dash-chart-legend span{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.lg-fat{background:rgba(59,130,246,.15);color:#3b82f6}
.lg-rec{background:rgba(34,197,94,.15);color:#22c55e}
.lg-desp{background:rgba(239,68,68,.15);color:#ef4444}
.lg-res{background:rgba(168,85,247,.15);color:#a855f7}
.lg-proj{background:rgba(20,184,166,.15);color:#14b8a6}
canvas#grafEvolucao{max-height:260px!important;width:100%!important}
canvas#grafDonutStatus{max-height:180px!important;width:160px!important;margin:0 auto;display:block}
canvas#grafToggle{max-height:220px!important;width:100%!important}
canvas.kpi-spark{max-height:40px!important;width:100%!important}
canvas#grafStatus{max-height:200px!important}
canvas#grafLeadsMes{max-height:200px!important}
canvas#grafLeadsStatus{max-height:200px!important}
.indicadores-box{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--borda)}
.indicadores-box h3{font-size:14px;font-weight:700;margin-bottom:12px}
.ind-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg3);font-size:12px}
.ind-item:last-child{border-bottom:none}
.ind-label{color:var(--text2)}
.ind-val{font-weight:700}
.ind-tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-left:6px}
.ind-tag.ok{background:rgba(34,197,94,.15);color:#22c55e}
.ind-tag.medio{background:rgba(245,158,11,.15);color:#f59e0b}
.ind-tag.baixo{background:rgba(239,68,68,.15);color:#ef4444}
.dash-bottom{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.dash-cat-box{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--borda)}
.dash-cat-box h3{font-size:14px;font-weight:700;margin-bottom:12px}
.cat-bar-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.cat-info{display:flex;justify-content:space-between;font-size:12px}
.cat-nome{color:var(--text2)}
.cat-val{font-weight:700}
.cat-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.donut-center{position:relative;width:160px;margin:0 auto}
.donut-total{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-total .val{font-size:28px;font-weight:800}
.donut-total .lbl{font-size:11px;color:var(--text2)}
.donut-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center}
.dl-item{display:flex;align-items:center;gap:6px;font-size:11px}
.dl-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dl-pct{color:var(--text2);margin-left:4px}
.grafico-card{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--borda);margin-bottom:16px}
.grafico-card h3{font-size:14px;font-weight:700;margin-bottom:12px}
.grafico-card canvas{max-height:200px!important}
.barra-abas{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.barra-abas button{padding:8px 14px;border:1px solid var(--borda);border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:var(--bg3);color:var(--text2);transition:.2s}
.barra-abas button.ativo{background:var(--primaria);color:#fff;border-color:var(--primaria)}
.linha-graficos{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.estq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.estq-item{background:var(--bg2);padding:12px;border-radius:10px;border:1px solid var(--borda);text-align:center}
.estq-item .nome{font-weight:700;font-size:13px}
.estq-item .info{font-size:11px;color:var(--text2);margin:4px 0}
.estq-item .qtd{font-size:22px;font-weight:800;margin:6px 0}
.estq-item .qtd.critico{color:var(--perigo)}
.estq-item .qtd.baixo{color:var(--aviso)}
.estq-item .qtd.ok{color:var(--sucesso)}
.orc-tema input,.orc-tema select,.orc-tema textarea{color:#fff;background:#1a2332;border-color:#2d3a4e}
.orc-nav{display:flex;gap:4px;margin-bottom:16px}
.orc-nav span{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);background:rgba(255,255,255,.05)}
.orc-nav span.ativo{background:var(--primaria);color:#fff}
.link-cell{display:flex;align-items:center;gap:4px}
.link-cell a{text-decoration:none;font-size:16px}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-container{animation:slideIn .3s ease;position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);color:#fff}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49;display:none}
.sidebar-overlay.show{display:block}
.conteudo{margin-left:0;padding:16px}
.form-grid{grid-template-columns:1fr}
.dash-main,.dash-bottom,.linha-graficos{grid-template-columns:1fr}
.kanban-col{min-width:260px}
}
</style>
</head>
<body>

<div id="telaLogin">
<div class="login-box">
<div style="background:var(--primaria);color:#fff;width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;margin:0 auto 16px">SF</div>
<h1>CRM SF Projetos Elétricos</h1>
<p class="sub">Faça login para continuar</p>
<label>Usuário</label><input type="text" id="loginUser" placeholder="Seu usuário">
<label>Senha</label><input type="password" id="loginPass" placeholder="••••••••">
<button onclick="logar()">Entrar no Sistema</button>
<div class="login-erro" id="loginErro">Usuário ou senha inválidos.</div>
<div class="login-links"><label><input type="checkbox" id="rememberMe"> Lembrar login</label></div>
</div></div>

<div id="app" style="display:none">
<div class="topo">
<div class="topo-esq"><span class="logo">SF</span><h2 style="font-size:16px">CRM Projetos Elétricos</h2></div>
<div class="topo-dir"><span id="userInfo"></span><button class="btn-icone" id="btnTema" onclick="altTema()">🌙</button><button class="btn-icone" onclick="sair()">🚪</button></div>
</div>
<div class="sidebar" id="sidebar"></div>
<div class="conteudo" id="conteudo"></div>
</div>

<div class="modal-overlay" id="modalLead"><div class="modal">
<button class="flut-direita" onclick="fecharModalLead()">✕</button><h2 id="tituloModalLead">👤 Novo Lead</h2>
<div class="form-grid">
<div class="grupo"><label>Nome</label><input id="fLeadNome"></div>
<div class="grupo"><label>Telefone</label><input id="fLeadTel"></div>
<div class="grupo"><label>Cidade</label><input id="fLeadCidade"></div>
<div class="grupo"><label>Origem</label><select id="fLeadOrigem"><option>Indicação</option><option>Instagram</option><option>WhatsApp</option><option>Site</option><option>Orçamento</option></select></div>
<div class="grupo"><label>Valor</label><input id="fLeadValor" value="R$ 0,00" onfocus="valorFocus(this)" onblur="valorBlur(this)"></div>
<div class="grupo"><label>Vendedor</label><select id="fLeadVendedor"><option>João</option><option>Bruno</option><option>Vinicius</option><option>Sistema</option></select></div>
<div class="grupo" style="grid-column:span 2"><label>Link Orçamento</label><input id="fLeadLink" placeholder="https://..."></div>
<div class="grupo" style="grid-column:span 2"><label>Observações</label><textarea id="fLeadObs" rows="2"></textarea></div>
</div>
<button class="btn btn-primary" onclick="salvarLeadModal()">💾 Salvar Lead</button>
</div></div>

<div class="modal-overlay" id="modalGasto"><div class="modal">
<button class="flut-direita" onclick="fecharModalGasto()">✕</button><h2>💰 Confirmar Venda</h2><p id="infoGasto" style="font-size:13px;color:var(--text2);margin-bottom:14px"></p>
<div class="form-grid">
<div class="grupo"><label>Cliente</label><input id="gastoCliente" readonly></div>
<div class="grupo"><label>Valor</label><input id="gastoValor" onfocus="valorFocus(this)" onblur="valorBlur(this)"></div>
<div class="grupo"><label>Gasto</label><input id="gastoGasto" value="R$ 0,00" onfocus="valorFocus(this)" onblur="valorBlur(this)"></div>
<div class="grupo"><label>Empresa</label><select id="gastoEmpresa"><option>SF</option><option>SPAZZIO</option><option>BRANCO</option><option>ÉTHOS</option><option>SOLAR FORCE</option><option>TAQUARI</option></select></div>
<div class="grupo"><label>Potência</label><input id="gastoPotencia" placeholder="Ex: 5kWp"></div>
</div>
<button class="btn btn-success" onclick="confirmarVenda()">✅ Confirmar Venda</button>
</div></div>

<div class="modal-overlay" id="modalEmpresa"><div class="modal">
<button class="flut-direita" onclick="fecharModalEmp()">✕</button><h2 id="tituloModalEmp">🏢 Nova Empresa</h2>
<div class="form-grid">
<div class="grupo"><label>CNPJ</label><input id="empCnpj"></div>
<div class="grupo"><label>Razão Social *</label><input id="empRazao"></div>
<div class="grupo"><label>Nome Fantasia</label><input id="empFantasia"></div>
<div class="grupo"><label>Telefone</label><input id="empTel"></div>
<div class="grupo"><label>Endereço</label><input id="empEnd"></div>
<div class="grupo"><label>Cidade</label><input id="empCidade"></div>
<div class="grupo"><label>UF</label><input id="empEstado" maxlength="2"></div>
<div class="grupo"><label>CEP</label><input id="empCep"></div>
<div class="grupo"><label>E-mail</label><input id="empEmail"></div>
</div>
<button class="btn btn-primary" onclick="salvarModalEmp()">💾 Salvar Empresa</button>
</div></div>

<div class="modal-overlay" id="modalProjeto"><div class="modal">
<button class="flut-direita" onclick="fecharModalProj()">✕</button><h2 id="tituloModalProj">📝 Novo Projeto</h2>
<div class="form-grid">
<div class="grupo" style="grid-column:span 2"><label>Cliente *</label><input id="mpCliente"></div>
<div class="grupo"><label>Empresa</label><select id="mpEmpresa"></select></div>
<div class="grupo"><label>Data</label><input id="mpData"></div>
<div class="grupo"><label>Status</label><select id="mpStatus"></select></div>
<div class="grupo"><label>Potência (kWp)</label><input id="mpPotencia" oninput="calcPotenciaValor()"></div>
<div class="grupo"><label>Valor</label><input id="mpValor" readonly></div>
<div class="grupo"><label>TRT</label><input id="mpTrt" readonly></div>
<div class="grupo"><label>Pago</label><select id="mpPago"><option>NÃO</option><option>SIM</option></select></div>
</div>
<div id="mpValoresRow"><span id="mpPotenciaFeedback" style="font-size:12px"></span></div>
<div style="margin-top:12px;border-top:1px solid var(--borda);padding-top:12px">
<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
<label style="font-size:12px;font-weight:600">📎 Documentos</label><input type="file" id="mpDocInput" multiple accept=".pdf,.doc,.docx,.txt,.xls,.xlsx" style="font-size:12px"></div>

// ===== MELHORIA 1: DEBOUNCE =====
function debounce(fn,ms){var t;return function(){clearTimeout(t);t=setTimeout(fn,ms)}}

// ===== MELHORIA 2: TOAST =====
function toast(msg,tipo){
  var existing=document.querySelector('.toast-container');if(existing)existing.remove();
  var el=document.createElement('div');el.className='toast-container';
  el.style.background=tipo==='erro'?'#ef4444':tipo==='aviso'?'#f59e0b':'#22c55e';
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .3s'},2500);
  setTimeout(function(){el.remove()},3000);
}

// ===== MELHORIA 3: CACHE COM TTL =====
async function get(t){
  var agora=Date.now();
  var expirado=cacheTTL[t]&&(agora-cacheTTL[t]>30000);
  try{
    if(cache[t]&&!expirado)return cache[t];
    var{data,error}=await sb.from(t).select('*').order('id',{ascending:false});
    if(error){console.error('GET '+t+':',error.message);if(cache[t])return cache[t];return[]}
    cache[t]=data||[];cacheTTL[t]=agora;return cache[t];
  }catch(e){console.error(e);if(cache[t])return cache[t];return[]}
}
function limparCache(){cache={};cacheTTL={}}
function getAndRefresh(t){cacheTTL[t]=null;return get(t)}

async function ins(t,d){try{cache[t]=null;var{data,error}=await sb.from(t).insert(d).select();if(error)return null;return data}catch(e){return null}}
async function upd(t,i,d){try{cache[t]=null;var{error}=await sb.from(t).update(d).eq('id',i);if(error)return false;return true}catch(e){return false}}
async function del(t,i){try{cache[t]=null;var{error}=await sb.from(t).delete().eq('id',i);if(error)return false;return true}catch(e){return false}}

function hoje(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()}

function calcularValorPorPotencia(potStr){
  if(!potStr)return{valor:'R$ 0,00',trt:'R$ 70,00'};
  var pot=parseFloat(String(potStr).replace(/[kKwWpP]/g,'').replace(',','.'))||0;
  var valor='R$ 0,00',trt='R$ 70,00';
  if(pot>0&&pot<=7.5){valor='R$ 370,00';trt='R$ 70,00'}
  else if(pot>7.5&&pot<=20){valor='R$ 500,00';trt='R$ 70,00'}
  else if(pot>20&&pot<=75){valor='R$ 900,00';trt='R$ 70,00'}
  else if(pot>75){valor='R$ 900,00';trt='R$ 70,00'}
  return{valor:valor,trt:trt}
}

    '<div class="ind-item"><span class="ind-label">Vendas Pendentes</span><span><span class="ind-val">'+pendentes+'</span><span class="ind-tag medio">Aguardando</span></span></div>'+
    '<div class="ind-item"><span class="ind-label">Projetos em Análise</span><span><span class="ind-val">'+projAndamento+'</span><span class="ind-tag '+(projAndamento>0?'medio':'ok')+'">'+(projAndamento>0?'Ativo':'Parado')+'</span></span></div>'+

    '<div class="ind-item"><span class="ind-label">Projetos Reprovados</span><span><span class="ind-val">'+projReprovados+'</span><span class="ind-tag '+(projReprovados>0?'baixo':'ok')+'">'+(projReprovados>0?'Atenção':'Ok')+'</span></span></div>'+

async function pagGastos(){var d=await get('gastos');_allGastos=d;var projetos=await get('projetos');var trtMap={};projetos.forEach(function(p){trtMap[p.cliente]=parseMon(p.trt)});if(!d.length){var v=await get('vendas');if(v.length){for(var i=0;i<v.length;i++){var l=parseMon(v[i].valor)-parseMon(v[i].gasto);await ins('gastos',{venda:v[i].cliente,cliente:v[i].cliente,empresa:v[i].empresa,mes:v[i].mes,valor_venda:v[i].valor,gasto:v[i].gasto,lucro:'R$ '+fmtNum(l)})}}d=await get('gastos');_allGastos=d}var emps=['SF','SPAZZIO','BRANCO','ÉTHOS','SOLAR FORCE','TAQUARI'];var ms=meses();var h='<div class="titulo-pag">🧾 Gastos</div><div class="filtro-bar"><div class="grupo"><label>Empresa</label><select id="fGastEmp" onchange="filtrarGastos()"><option value="">Todas</option>'+emps.map(function(e){return'<option>'+e+'</option>'}).join('')+'</select></div><div class="grupo"><label>Mês</label><select id="fGastMes" onchange="filtrarGastos()"><option value="">Todos</option>'+ms.map(function(e){return'<option>'+e+'</option>'}).join('')+'</select></div><button class="btn btn-outline" onclick="limparFiltrosGastos()">Limpar</button></div><p style="margin-bottom:12px" id="gastCount">'+d.length+' registros</p><div class="tabela-wrap"><table><thead><tr><th>Venda</th><th>Cliente</th><th>Empresa</th><th>Mês</th><th>Valor</th><th>TRT</th><th>Gasto</th><th>Lucro Real</th></tr></thead><tbody id="gastBody"></tbody></table></div>';document.getElementById('conteudo').innerHTML=h;window._trtMap=trtMap;filtrarGastos()}
function limparFiltrosGastos(){['fGastEmp','fGastMes'].forEach(function(id){var el=document.getElementById(id);if(el)el.value=''});filtrarGastos()}
function filtrarGastos(){var emp=document.getElementById('fGastEmp')?document.getElementById('fGastEmp').value:'';var mes=document.getElementById('fGastMes')?document.getElementById('fGastMes').value:'';var d=_allGastos;var trtMap=window._trtMap||{};if(emp)d=d.filter(function(g){return g.empresa==emp});if(mes)d=d.filter(function(g){return g.mes==mes});var tl=0;var h='';d.forEach(function(g){var trt=trtMap[g.cliente]||0;var lucroReal=parseMon(g.valor_venda)-parseMon(g.gasto)-trt;tl+=lucroReal;h+='<tr><td>'+g.venda+'</td><td>'+g.cliente+'</td><td>'+(g.empresa||'')+'</td><td>'+(g.mes||'')+'</td><td>'+(g.valor_venda||'')+'</td><td>R$ '+fmtNum(trt)+'</td><td>'+(g.gasto||'')+'</td><td style="font-weight:600;color:'+(lucroReal>=0?'var(--sucesso)':'var(--perigo)')+'">R$ '+fmtNum(lucroReal)+'</td></tr>'});h+='<tr style="font-weight:700;background:var(--bg3)"><td colspan="7">LUCRO TOTAL</td><td style="color:'+(tl>=0?'var(--sucesso)':'var(--perigo)')+'">R$ '+fmtNum(tl)+'</td></tr>';if(!d.length)h='<tr><td colspan="8" style="text-align:center;padding:30px">Nenhum registro</td></tr>'+h;document.getElementById('gastBody').innerHTML=h;document.getElementById('gastCount').textContent=d.length+' registros • Lucro: R$ '+fmtNum(tl);}

// ===== EMPRESAS =====
async function pagEmpresas(){if(!['Administrador','Financeiro'].includes(usuarioAtual.funcao)){document.getElementById('conteudo').innerHTML='<div class="titulo-pag">🏢 Empresas</div><p>Acesso negado</p>';return}var d=await get('empresas');var h='<div class="titulo-pag">🏢 Empresas</div><button class="btn btn-primary" onclick="abrirModalEmp()" style="margin-bottom:12px">+ Nova Empresa</button><div class="tabela-wrap"><table><thead><tr><th>Nome Fantasia</th><th>Razão Social</th><th>CNPJ</th><th>Endereço</th><th>Cidade/UF</th><th>Telefone</th><th>Ações</th></tr></thead><tbody>';d.forEach(function(e){h+='<tr><td><strong>'+(e.nome_fantasia||'—')+'</strong></td><td>'+(e.razao_social||'')+'</td><td>'+(e.cnpj||'')+'</td><td>'+(e.endereco||'')+'</td><td>'+(e.cidade||'')+'/'+(e.estado||'')+'</td><td>'+(e.telefone||'')+'</td><td><button class="btn-icone" onclick="editEmp('+e.id+')">✏️</button><button class="btn-icone" onclick="delEmp('+e.id+')">🗑️</button></td></tr>'});if(!d.length)h+='<tr><td colspan="7" style="text-align:center;padding:30px">Nenhuma empresa cadastrada</td></tr>';h+='</tbody></table></div>';document.getElementById('conteudo').innerHTML=h}
function abrirModalEmp(e){idxEditEmp=e?e.id:null;document.getElementById('tituloModalEmp').textContent=e?'✏️ Editar Empresa':'🏢 Nova Empresa';document.getElementById('empCnpj').value=e?(e.cnpj||''):'';document.getElementById('empRazao').value=e?(e.razao_social||''):'';document.getElementById('empFantasia').value=e?(e.nome_fantasia||''):'';document.getElementById('empTel').value=e?(e.telefone||''):'';document.getElementById('empEnd').value=e?(e.endereco||''):'';document.getElementById('empCidade').value=e?(e.cidade||''):'';document.getElementById('empEstado').value=e?(e.estado||''):'';document.getElementById('empCep').value=e?(e.cep||''):'';document.getElementById('empEmail').value=e?(e.email||''):'';document.getElementById('modalEmpresa').classList.add('show')}
function fecharModalEmp(){document.getElementById('modalEmpresa').classList.remove('show');idxEditEmp=null}
async function salvarModalEmp(){var rz=document.getElementById('empRazao').value.trim();if(!rz){toast('Informe a razão social','erro');return}var dados={cnpj:document.getElementById('empCnpj').value.trim(),razao_social:rz,nome_fantasia:document.getElementById('empFantasia').value.trim(),telefone:document.getElementById('empTel').value.trim(),endereco:document.getElementById('empEnd').value.trim(),cidade:document.getElementById('empCidade').value.trim(),estado:document.getElementById('empEstado').value.trim(),cep:document.getElementById('empCep').value.trim(),email:document.getElementById('empEmail').value.trim()};if(idxEditEmp){await upd('empresas',idxEditEmp,dados);toast('Empresa atualizada','sucesso')}else{await ins('empresas',dados);toast('Empresa criada','sucesso')}fecharModalEmp();pagEmpresas()}
async function editEmp(id){var d=await get('empresas');var e=d.find(function(x){return x.id==id});if(e)abrirModalEmp(e)}
async function delEmp(id){if(!confirm('Excluir esta empresa?'))return;await del('empresas',id);toast('Empresa removida','aviso');pagEmpresas()}

// ===== PROJETOS (KANBAN) =====
async function pagProjetos(){await carregarFases();var isEmp=(usuarioAtual.funcao=='Empresa');var m=document.getElementById('conteudo');var filtrosHtml=isEmp?'':'<div class="filtro-bar"><div class="grupo"><label>Empresa</label><select id="fProjEmp" onchange="filtrarProjetos()"><option value="">Todas</option></select></div><button class="btn btn-outline" onclick="limparFiltrosProjetos()">Limpar</button></div>';m.innerHTML='<div class="titulo-pag">🔬 Projetos</div><div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-primary" onclick="abrirModalProj()">+ Novo Projeto</button><button class="btn btn-outline" onclick="abrirModalFases()">⚙️ Fases</button>'+(isEmp?'':'<button class="btn btn-success" onclick="abrirModalPDF()">📄 Exportar PDF</button>')+'</div>'+filtrosHtml+'<div id="kanbanBoard" class="kanban-board"></div>';var d=await get('projetos');_allProjetos=d;if(isEmp){var empTxt=(usuarioAtual.empresa||'').toLowerCase();d=d.filter(function(p){return(p.empresa||'').toLowerCase()==empTxt||(p.empresa||'').toLowerCase().includes(empTxt)||empTxt.includes((p.empresa||'').toLowerCase())})}window._P=d;window._PROJETOS_CACHE=d;if(!isEmp){var sel=document.getElementById('fProjEmp');var emps=[...new Set(d.map(function(p){return p.empresa}).filter(Boolean))];emps.sort();emps.forEach(function(e){sel.innerHTML+='<option value="'+e+'">'+e+'</option>'})}renderizarKanban(d)}
function limparFiltrosProjetos(){var el=document.getElementById('fProjEmp');if(el)el.value='';filtrarProjetos()}
function filtrarProjetos(){var emp=document.getElementById('fProjEmp')?document.getElementById('fProjEmp').value:'';var d=_allProjetos;if(emp)d=d.filter(function(p){return p.empresa==emp});window._P=d;window._PROJETOS_CACHE=d;renderizarKanban(d)}
function renderizarKanban(d){var board=document.getElementById('kanbanBoard');if(!board)return;board.innerHTML='';KANBAN_FASES.forEach(function(st){var stNome=st.nome;var projs=d.filter(function(p){return(p.status||'Recebido')==stNome});var col=document.createElement('div');col.className='kanban-col';col.ondragover=function(ev){ev.preventDefault()};col.ondrop=function(ev){ev.preventDefault();dropOnCol(ev,stNome)};var hdr='<div class="kanban-col-header"><span><span class="kanban-col-dot" style="background:'+(STATUS_CORES[stNome]||st.cor)+'"></span>'+(STATUS_ICONES[stNome]||st.icone)+' '+stNome+'</span><span class="kanban-col-count">'+projs.length+'</span></div>';var cards='<div class="kanban-cards">';projs.forEach(function(p){var docs=[];try{docs=JSON.parse(p.documentos||'[]')}catch(e){}var fotos=[];try{fotos=JSON.parse(p.fotos||'[]')}catch(e){}cards+='<div class="kanban-card" draggable="true" ondragstart="dragStartCard(event,'+p.id+')" ondragend="dragEndCard(event)" onclick="abrirModalProjById('+p.id+')"><div class="kanban-card-title">'+p.cliente+'</div><div class="kanban-card-info">'+(p.empresa||'—')+' | '+(p.data||'')+(p.potencia?' | ⚡ '+p.potencia:'')+'</div>'+(!(usuarioAtual.funcao=='Empresa')?'<div class="kanban-card-valor">R$ '+fmtNum(parseMon(p.valor))+'</div><div class="kanban-card-sub">TRT: R$ '+fmtNum(parseMon(p.trt))+' '+(p.pago=='SIM'?'✅':'⏳')+'</div>':'')+'<div class="kanban-card-anexos">'+(docs.length?'📎 '+docs.length+' doc(s)':'')+(fotos.length?(docs.length?' • ':'')+'📷 '+fotos.length+' foto(s)':'')+(!docs.length&&!fotos.length?'Sem anexos':'')+'</div></div>'});if(!projs.length)cards+='<div class="kanban-dropzone">Arraste projetos aqui</div>';cards+='</div>';col.innerHTML=hdr+cards;board.appendChild(col)})}

// FASES KANBAN
function abrirModalFases(){renderFasesList();document.getElementById('modalFases').classList.add('show')}
function fecharModalFases(){document.getElementById('modalFases').classList.remove('show')}
function renderFasesList(){var c=document.getElementById('fasesList');c.innerHTML='';KANBAN_FASES.forEach(function(f,i){var div=document.createElement('div');div.style.cssText='display:flex;align-items:center;gap:8px;background:var(--bg3);padding:10px;border-radius:8px;margin-bottom:6px;flex-wrap:wrap';div.innerHTML='<span style="width:24px;text-align:center;font-size:18px">'+f.icone+'</span><input value="'+f.nome+'" onchange="editFaseNome('+i+',this.value)" style="flex:1;min-width:100px;padding:6px 8px;border:1px solid var(--input-border);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:13px"><input type="color" value="'+f.cor+'" onchange="editFaseCor('+i+',this.value)" style="width:36px;height:32px;border:1px solid var(--input-border);border-radius:4px;cursor:pointer;background:transparent"><button onclick="moverFase('+i+',-1)" '+(i==0?'disabled':'')+' style="background:none;border:1px solid var(--borda);border-radius:4px;cursor:pointer;padding:4px 8px;font-size:12px;color:var(--text2);opacity:'+(i==0?'.4':'1')+'">↑</button><button onclick="moverFase('+i+',1)" '+(i==KANBAN_FASES.length-1?'disabled':'')+' style="background:none;border:1px solid var(--borda);border-radius:4px;cursor:pointer;padding:4px 8px;font-size:12px;color:var(--text2);opacity:'+(i==KANBAN_FASES.length-1?'.4':'1')+'">↓</button><button onclick="delFase('+i+')" style="background:none;border:none;cursor:pointer;color:var(--perigo);font-size:16px">🗑️</button>';c.appendChild(div)})}
function addFase(){var nome=document.getElementById('novaFaseNome').value.trim();if(!nome){document.getElementById('faseMsg').textContent='Informe o nome';return}var cor=document.getElementById('novaFaseCor').value;var icone=document.getElementById('novaFaseIcone').value.trim()||'📋';KANBAN_FASES.push({nome:nome,cor:cor,icone:icone});document.getElementById('novaFaseNome').value='';document.getElementById('novaFaseIcone').value='';renderFasesList();document.getElementById('faseMsg').textContent=''}
function editFaseNome(i,v){KANBAN_FASES[i].nome=v}
function editFaseCor(i,v){KANBAN_FASES[i].cor=v}
function moverFase(i,dir){var j=i+dir;if(j<0||j>=KANBAN_FASES.length)return;var tmp=KANBAN_FASES[i];KANBAN_FASES[i]=KANBAN_FASES[j];KANBAN_FASES[j]=tmp;renderFasesList()}
function delFase(i){if(!confirm('Remover "'+KANBAN_FASES[i].nome+'"? Projetos nesta fase ficarão sem coluna.'))return;KANBAN_FASES.splice(i,1);renderFasesList()}
async function salvarEFechaFases(){syncStatusVars();await salvarFases();document.getElementById('faseMsg').style.color='var(--sucesso)';document.getElementById('faseMsg').textContent='✅ Fases salvas!';setTimeout(function(){fecharModalFases();pagProjetos()},600)}
function abrirModalProjById(id){var p=(window._PROJETOS_CACHE||[]).find(function(x){return x.id==id});if(p)abrirModalProj(p)}
function dragStartCard(ev,id){draggedProjectId=id;ev.dataTransfer.effectAllowed='move';ev.target.classList.add('dragging')}
function dragEndCard(ev){ev.target.classList.remove('dragging')}
function dropOnCol(ev,status){ev.preventDefault();if(draggedProjectId){upd('projetos',parseInt(draggedProjectId),{status:status});draggedProjectId=null;setTimeout(function(){pagProjetos()},300)}}

async function onEmpresaChange(){var sel=document.getElementById('mpEmpresa');var id=parseInt(sel.value);var box=document.getElementById('mpEmpresaInfo');if(!id||String(sel.value).indexOf('manual_')===0){if(String(sel.value).indexOf('manual_')===0){box.style.display='block';box.innerHTML='<strong>Empresa:</strong> '+String(sel.value).replace('manual_','')+'<br><em>Cadastre-a na aba Empresas para vincular CNPJ e endereço.</em>'}else{box.style.display='none'}return}var emps=await get('empresas');var e=emps.find(function(x){return x.id==id});if(!e){box.style.display='none';return}box.style.display='block';box.innerHTML='<strong>CNPJ:</strong> '+(e.cnpj||'—')+' &nbsp; <strong>Razão Social:</strong> '+(e.razao_social||'—')+'<br><strong>Endereço:</strong> '+(e.endereco||'—')+', '+(e.cidade||'')+'/'+(e.estado||'')+' &nbsp; <strong>CEP:</strong> '+(e.cep||'—')+'<br><strong>Telefone:</strong> '+(e.telefone||'—')+' &nbsp; <strong>E-mail:</strong> '+(e.email||'')}
function calcPotenciaValor(){var potStr=document.getElementById('mpPotencia').value.trim();var fb=document.getElementById('mpPotenciaFeedback');if(!potStr){if(fb)fb.textContent='';document.getElementById('mpValor').value='';document.getElementById('mpTrt').value='';return}var r=calcularValorPorPotencia(potStr);document.getElementById('mpValor').value=r.valor;document.getElementById('mpTrt').value=r.trt;if(fb){fb.textContent='→ Valor: '+r.valor+' | TRT: '+r.trt;fb.style.color='var(--sucesso)'}}
async function abrirModalProj(p){idxEditProjModal=p?p.id:null;document.getElementById('tituloModalProj').textContent=p?'✏️ Editar Projeto':'📝 Novo Projeto';document.getElementById('mpCliente').value=p?p.cliente:'';document.getElementById('mpData').value=p?(p.data||hoje()):hoje();var selSt=document.getElementById('mpStatus');selSt.innerHTML='';KANBAN_FASES.forEach(function(f){selSt.innerHTML+='<option value="'+f.nome+'">'+f.icone+' '+f.nome+'</option>'});selSt.value=p?(p.status||'Recebido'):'Recebido';document.getElementById('mpPotencia').value=p?(p.potencia||''):'';if(p&&p.potencia){calcPotenciaValor()}projDocs=[];projFotos=[];if(p&&p.documentos){try{projDocs=JSON.parse(p.documentos)}catch(e){projDocs=[]}}if(p&&p.fotos){try{projFotos=JSON.parse(p.fotos)}catch(e){projFotos=[]}}document.getElementById('mpBtnDel').style.display=p?'inline-flex':'none';document.getElementById('mpDocInput').value='';document.getElementById('mpFotoInput').value='';renderProjDocs();renderProjFotos();document.getElementById('mpMsg').textContent='';document.getElementById('mpPotenciaFeedback').textContent='';document.getElementById('modalProjeto').classList.add('show');document.getElementById('mpDocInput').onchange=function(e){addProjDocs(e.target.files)};document.getElementById('mpFotoInput').onchange=function(e){addProjFotos(e.target.files)}}
function fecharModalProj(){document.getElementById('modalProjeto').classList.remove('show');idxEditProjModal=null}
function renderProjDocs(){var c=document.getElementById('mpDocsList');if(!c)return;c.innerHTML='';projDocs.forEach(function(d,i){var el=document.createElement('div');el.style.cssText='display:flex;align-items:center;gap:4px;background:var(--bg3);padding:5px 10px;border-radius:6px;font-size:12px';el.innerHTML='<span>📎 '+d.nome+'</span><button onclick="remProjDoc('+i+')" style="background:none;border:none;cursor:pointer;color:var(--perigo);font-size:14px">✕</button>';c.appendChild(el)})}
function renderProjFotos(){var c=document.getElementById('mpFotosList');if(!c)return;c.innerHTML='';projFotos.forEach(function(f,i){var el=document.createElement('div');el.style.cssText='position:relative';el.innerHTML='<img src="'+f.data+'" style="width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid var(--borda)"><button onclick="remProjFoto('+i+')" style="position:absolute;top:-5px;right:-5px;background:var(--perigo);color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:11px">✕</button>';c.appendChild(el)})}
function addProjDocs(files){for(var i=0;i<files.length;i++){(function(f){if(f.size>2*1024*1024){toast('Arquivo muito grande (máx 2MB)','erro');return}var reader=new FileReader();reader.onload=function(e){projDocs.push({nome:f.name,tipo:f.type,data:e.target.result});renderProjDocs()};reader.readAsDataURL(f)})(files[i])}}
function addProjFotos(files){for(var i=0;i<files.length;i++){(function(f){if(f.size>3*1024*1024){toast('Foto muito grande (máx 3MB)','erro');return}var reader=new FileReader();reader.onload=function(e){projFotos.push({nome:f.name,tipo:f.type,data:e.target.result});renderProjFotos()};reader.readAsDataURL(f)})(files[i])}}
function remProjDoc(i){projDocs.splice(i,1);renderProjDocs()}
function remProjFoto(i){projFotos.splice(i,1);renderProjFotos()}
async function salvarModalProj(){var cl=document.getElementById('mpCliente').value.trim();if(!cl){document.getElementById('mpMsg').textContent='Informe o cliente';document.getElementById('mpMsg').style.color='var(--perigo)';return}var potVal=document.getElementById('mpPotencia').value.trim();var dados={cliente:cl,empresa:'',data:document.getElementById('mpData').value.trim()||hoje(),status:document.getElementById('mpStatus').value,potencia:potVal};if(potVal){var calc=calcularValorPorPotencia(potVal);dados.valor=calc.valor;dados.trt=calc.trt;dados.pago='NÃO'}else{dados.valor='R$ 0,00';dados.trt='R$ 0,00';dados.pago='NÃO'}var msg=document.getElementById('mpMsg');msg.style.color='var(--aviso)';msg.textContent='Salvando...';var ok=false;var dadosCompletos=Object.assign({},dados,{documentos:JSON.stringify(projDocs),fotos:JSON.stringify(projFotos)});var dadosSemAnexos=Object.assign({},dados);if(idxEditProjModal){ok=await upd('projetos',idxEditProjModal,dadosCompletos);if(!ok){ok=await upd('projetos',idxEditProjModal,dadosSemAnexos)}}else{var r=await ins('projetos',dadosCompletos);if(!r){r=await ins('projetos',dadosSemAnexos);ok=!!r}else{ok=true}}if(ok){msg.style.color='var(--sucesso)';msg.textContent='✅ Salvo!';setTimeout(function(){fecharModalProj();pagProjetos()},800)}else{msg.style.color='var(--perigo)';msg.textContent='❌ Erro ao salvar. Abra o console (F12).'}}
async function excluirModalProj(){if(!idxEditProjModal)return;if(!confirm('Excluir este projeto?'))return;await del('projetos',idxEditProjModal);fecharModalProj();pagProjetos()}
function limparModalProj(){document.getElementById('mpCliente').value='';document.getElementById('mpData').value=hoje();document.getElementById('mpStatus').value='Recebido';document.getElementById('mpPotencia').value='';document.getElementById('mpPotenciaFeedback').textContent='';document.getElementById('mpValor').value='';document.getElementById('mpTrt').value='R$ 70,00';projDocs=[];projFotos=[];renderProjDocs();renderProjFotos();document.getElementById('mpMsg').textContent='';idxEditProjModal=null;document.getElementById('tituloModalProj').textContent='📝 Novo Projeto';document.getElementById('mpBtnDel').style.display='none';document.getElementById('mpDocInput').value='';document.getElementById('mpFotoInput').value=''}
