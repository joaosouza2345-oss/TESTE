<style>
:root{--bg:#f0f2f5;--bg2:#fff;--bg3:#f8f9fa;--text:#1a1a2e;--text2:#555;--side:#1a2332;--side-txt:#c8d0dc;--side-hover:#2a3a52;--borda:#e0e0e0;--primaria:#2563eb;--sucesso:#16a34a;--perigo:#dc2626;--aviso:#f59e0b;--input-bg:#fff;--input-border:#d1d5db;--header-bg:#1a2332;--header-txt:#fff}
.dark{--bg:#0f1724;--bg2:#1a2332;--bg3:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--side:#0d1321;--side-txt:#94a3b8;--side-hover:#1e293b;--borda:#2d3a4e;--primaria:#3b82f6;--sucesso:#22c55e;--perigo:#ef4444;--aviso:#fbbf24;--input-bg:#1e293b;--input-border:#334155;--header-bg:#0d1321;--header-txt:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
#telaLogin{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f1724,#1a2332);padding:16px}
.login-box{background:#1a2332;padding:28px 24px;border-radius:14px;width:100%;max-width:360px}
.login-box h1{color:#fff;font-size:20px;margin-bottom:4px}
.login-box .sub{color:#94a3b8;font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:10px 12px;border:1px solid #334155;border-radius:6px;background:#0d1321;color:#fff;margin-bottom:14px;outline:none}
.login-box input:focus{border-color:var(--primaria)}
.login-box button{width:100%;padding:11px;background:var(--primaria);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:14px}
#app{display:none}
.topo{background:var(--header-bg);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:fixed;top:0;left:0;right:0;z-index:100}
.topo-left{display:flex;align-items:center;gap:10px}
.menu-toggle{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;display:none;padding:4px}
.topo-right{display:flex;align-items:center;gap:6px}
.sidebar{width:200px;background:var(--side);position:fixed;top:52px;left:0;bottom:0;z-index:50;transition:transform .25s;overflow-y:auto}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:10px 16px;color:var(--side-txt);cursor:pointer;font-size:13px;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--side-hover)}
.sidebar-item.ativo{background:var(--side-hover);border-left-color:var(--primaria);color:#fff;font-weight:600}
.conteudo{margin-left:200px;padding:16px;padding-top:68px;min-height:100vh}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.kpi-card{background:var(--bg2);border:1px solid var(--borda);border-radius:12px;padding:14px;border-left:4px solid var(--primaria)}
.kpi-card .valor{font-size:22px;font-weight:700;margin-top:4px}
.kpi-card .label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.dash-bottom{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.dash-cat-box{background:var(--bg2);border:1px solid var(--borda);border-radius:12px;padding:14px}
.kanban-board{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;min-height:400px}
.kanban-col{min-width:240px;max-width:300px;background:var(--bg3);border-radius:10px;padding:10px;display:flex;flex-direction:column;flex:1}
.kanban-col h3{font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between;padding:0 4px}
.kanban-col h3 span{background:var(--bg2);padding:0 8px;border-radius:10px;font-size:11px}
.kanban-card{background:var(--bg2);border-radius:8px;padding:10px;border:1px solid var(--borda);margin-bottom:6px;cursor:pointer;font-size:12px;transition:box-shadow .2s}
.kanban-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.kanban-card .nome{font-weight:600;font-size:13px;margin-bottom:4px}
.kanban-card .info{color:var(--text2);font-size:11px;margin:2px 0}
.kanban-card .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-top:4px}
.tabela-wrap{overflow-x:auto;background:var(--bg2);border-radius:10px;border:1px solid var(--borda)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;border-bottom:1px solid var(--borda);text-align:left;white-space:nowrap}
th{background:var(--bg3);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
tr:hover{background:var(--bg3)}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-size:13px;transition:opacity .2s;display:inline-flex;align-items:center;gap:4px}
.btn:hover{opacity:.85}
.btn-primary{background:var(--primaria);color:#fff}
.btn-success{background:var(--sucesso);color:#fff}
.btn-danger{background:var(--perigo);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--borda);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:12px}
.top-actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);padding:20px;border-radius:12px;width:700px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:14px}
.modal h3{font-size:14px;margin:14px 0 8px;color:var(--text2)}
.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.form-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.form-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grupo{display:flex;flex-direction:column;margin-bottom:8px}
.grupo label{font-size:11px;font-weight:600;margin-bottom:3px;color:var(--text2)}
.grupo input,.grupo select{padding:8px;border:1px solid var(--input-border);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:13px;outline:none}
.grupo input:focus,.grupo select:focus{border-color:var(--primaria)}
.file-input-wrap{display:flex;gap:8px;align-items:center}
.file-input-wrap input[type=file]{flex:1;padding:6px}
.modal-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.file-list{margin-top:6px;font-size:11px;color:var(--text2)}
.search-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:180px;padding:8px 12px;border:1px solid var(--input-border);border-radius:6px;background:var(--input-bg);color:var(--text);font-size:13px;outline:none}
.search-bar input:focus{border-color:var(--primaria)}

.user-row{display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid var(--borda);font-size:13px}
.user-row:last-child{border:none}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--borda);border-radius:8px;padding:12px 16px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:300;display:none;max-width:360px;font-size:13px}
.toast.show{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.chart-wrap{background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:14px;margin-bottom:14px}
.chart-wrap h3{font-size:14px;margin-bottom:8px}
.chart-container{position:relative;height:250px}
@media(max-width:768px){
.menu-toggle{display:block}
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.conteudo{margin-left:0}
.kpi-row{grid-template-columns:1fr 1fr}
.form-grid{grid-template-columns:1fr}
.kanban-col{min-width:220px}
}
</style>
</head>

<script>
// ═══════════════════════════════════════
// CONFIG SUPABASE  🔴 COLE SUA ANON KEY
// ═══════════════════════════════════════
const SUPABASE_URL = 'https://zzcenbzqlzibrqnjooia.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6Y2VuYnpxbHppYnJxbmpvb2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NDI0OTUsImV4cCI6MjA5OTExODQ5NX0.Or-9slW0TtyPmf39NeqNrE9Zym2bXeCHgTFgSvO7X0s'

if (SUPABASE_ANON_KEY === 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6Y2VuYnpxbHppYnJxbmpvb2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NDI0OTUsImV4cCI6MjA5OTExODQ5NX0.Or-9slW0TtyPmf39NeqNrE9Zym2bXeCHgTFgSvO7X0s') {
  document.body.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;"><h2>🔴 Configure a SUPABASE_ANON_KEY</h2><p style="margin-top:12px;color:#555;">Abra o arquivo, localize a linha <code>const SUPABASE_ANON_KEY</code> e substitua pela chave do seu projeto Supabase.</p><p style="margin-top:8px;color:#888;font-size:13px;">Vá em: Project Settings &gt; API Settings &gt; anon public</p></div>'
}

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ═══════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════
let usuarioAtual = null
let projetos = []
let empresas = []
let statusList = []
let usuarios = []
let projetoEditandoId = null

// ═══════════════════════════════════════
// RESTAURAR SESSÃO (NÃO DESLOGA NO F5)
// ═══════════════════════════════════════
;(function restaurarSessao() {
  try {
    const salvo = localStorage.getItem('crm_usuario')
    if (salvo) {
      usuarioAtual = JSON.parse(salvo)
      document.getElementById('telaLogin').style.display = 'none'
      document.getElementById('app').style.display = 'block'
      document.getElementById('userInfo').textContent = '👤 ' + usuarioAtual.nome + ' (' + usuarioAtual.funcao + ')'
      // Aguarda DOM carregar e inicializa
      setTimeout(() => init(), 100)
    }
  } catch (e) {
    console.warn('Sessão anterior inválida, ignorando.')
    localStorage.removeItem('crm_usuario')
  }
})()

// ═══════════════════════════════════════
// FUNÇÕES AUXILIARES
// ═══════════════════════════════════════
function maskDate(el) {
  let v = el.value.replace(/\D/g, '').slice(0, 8)
  if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2)
  if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5)
  el.value = v
}

function valorBlur(el) {
  let v = el.value.replace(/\D/g, '')
  if (!v) { el.value = ''; return }
  let num = parseInt(v) / 100
  el.value = num.toLocaleString('pt-BR', { minimumFractionDigits: 2 })
}

function parseValor(str) {
  if (!str) return 0
  if (typeof str === 'number') return str
  return parseFloat(str.replace(/\./g, '').replace(',', '.')) || 0
}

function fmtMoeda(v) {
  return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2 })
}

function fmtData(d) {
  if (!d) return ''
  const dt = new Date(d + (d.includes('T') ? '' : 'T12:00:00'))
  return isNaN(dt) ? d : dt.toLocaleDateString('pt-BR')
}

function dataParaISO(s) {
  if (!s) return null
  const p = s.split('/')
  return p.length === 3 ? p[2] + '-' + p[1] + '-' + p[0] : s
}

function mostrarToast(msg, tipo) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.style.borderLeft = '4px solid ' + (tipo === 'erro' ? 'var(--perigo)' : tipo === 'aviso' ? 'var(--aviso)' : 'var(--sucesso)')
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 4000)
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open')
}

// ═══════════════════════════════════════
// ENVIAR ARQUIVOS PARA GOOGLE DRIVE
// ═══════════════════════════════════════
async function enviarParaDrive(projetoId, cliente, empresa) {
  const docs = [], fotos = []
  const inputDocs = document.getElementById('mpDocumentos')
  const inputFotos = document.getElementById('mpFotos')
  
  if (inputDocs && inputDocs.files.length > 0) {
    for (const f of inputDocs.files) {
      const b64 = await fileToBase64(f)
      docs.push({ nome: f.name, dados: b64.split(',')[1] })
    }
  }
  if (inputFotos && inputFotos.files.length > 0) {
    for (const f of inputFotos.files) {
      const b64 = await fileToBase64(f)
      fotos.push({ nome: f.name, dados: b64.split(',')[1] })
    }
  }
  if (docs.length === 0 && fotos.length === 0) return

  try {
    const res = await fetch(SUPABASE_URL + '/functions/v1/enviar-para-drive', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ projetoId, cliente, empresa, documentos: docs, fotos })
    })
    const data = await res.json()
    if (data.success) mostrarToast('📁 Arquivos enviados ao Google Drive!', 'sucesso')
    return data
  } catch (e) {
    console.error('Erro ao enviar para Drive:', e)
    return null
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.readAsDataURL(file)
    reader.onload = () => resolve(reader.result)
    reader.onerror = reject
  })
}

// ═══════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════
async function logar() {
  const user = document.getElementById('loginUser').value.trim()
  const pass = document.getElementById('loginPass').value.trim()
  if (!user || !pass) { mostrarErro('Preencha usuário e senha'); return }
  try {
    const { data, error } = await supabase.from('usuarios').select('*').eq('usuario', user).single()
    if (error || !data) { mostrarErro('Usuário não encontrado'); return }
    if (data.senha !== pass) { mostrarErro('Senha incorreta'); return }
    usuarioAtual = data
    localStorage.setItem('crm_usuario', JSON.stringify(data))
    document.getElementById('telaLogin').style.display = 'none'
    document.getElementById('app').style.display = 'block'
    document.getElementById('userInfo').textContent = '👤 ' + data.nome + ' (' + data.funcao + ')'
    init()
  } catch (e) { mostrarErro('Erro ao conectar: ' + e.message) }
}

function mostrarErro(msg) {
  const el = document.getElementById('loginErro')
  el.textContent = msg; el.style.display = 'block'
  setTimeout(() => el.style.display = 'none', 3000)
}

function sair() {
  usuarioAtual = null
  localStorage.removeItem('crm_usuario')
  document.getElementById('app').style.display = 'none'
  document.getElementById('telaLogin').style.display = 'flex'
}

// ═══════════════════════════════════════
// TEMA
// ═══════════════════════════════════════
let temaEscuro = localStorage.getItem('crm_tema') === 'dark'
if (temaEscuro) document.body.classList.add('dark')

function altTema() {
  temaEscuro = !temaEscuro
  document.body.classList.toggle('dark', temaEscuro)
  localStorage.setItem('crm_tema', temaEscuro ? 'dark' : 'light')
}

// ═══════════════════════════════════════
// INICIALIZAÇÃO
// ═══════════════════════════════════════
function init() {
  renderSidebar()
  carregarDados().then(() => {
    renderDashboard()
  }).catch(e => {
    console.error('Erro ao carregar dados iniciais:', e)
    document.getElementById('conteudo').innerHTML = '<div style="padding:30px;text-align:center;"><h3>❌ Erro ao carregar dados</h3><p style="margin-top:8px;color:var(--text2);">' + e.message + '</p><p style="margin-top:12px;font-size:13px;color:var(--text2);">Verifique no console do navegador (F12) e confirme se as tabelas "projetos", "empresas", "status_projetos" e "usuarios" existem no Supabase.</p></div>'
  })
}

function renderSidebar() {
  const itens = [
    { id: 'dashboard', icon: '📊', label: 'Dashboard' },
    { id: 'kanban', icon: '📋', label: 'Kanban' },
    { id: 'tabela', icon: '📝', label: 'Tabela' },

    { id: 'config', icon: '⚙️', label: 'Config' }
  ]
  const sb = document.getElementById('sidebar')
  sb.innerHTML = ''
  itens.forEach(item => {
    const div = document.createElement('div')
    div.className = 'sidebar-item'
    div.dataset.page = item.id
    div.innerHTML = item.icon + ' ' + item.label
    div.onclick = () => {
      document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('ativo'))
      div.classList.add('ativo')
      mostrarPagina(item.id)
      if (window.innerWidth <= 768) sb.classList.remove('open')
    }
    sb.appendChild(div)
  })
  if (sb.firstChild) sb.firstChild.classList.add('ativo')
}

async function carregarDados() {
  console.log('Carregando dados do Supabase...')
  try {
    const [p, e, s, u] = await Promise.all([
      supabase.from('projetos').select('*').order('created_at', { ascending: false }),
      supabase.from('empresas').select('*').order('nome'),
      supabase.from('status_projetos').select('*').order('ordem'),
      supabase.from('usuarios').select('*')
    ])
    if (p.error) throw new Error('Erro na tabela projetos: ' + p.error.message)
    if (e.error) throw new Error('Erro na tabela empresas: ' + e.error.message)
    if (s.error) throw new Error('Erro na tabela status_projetos: ' + s.error.message)
    if (u.error) throw new Error('Erro na tabela usuarios: ' + u.error.message)
    
    projetos = p.data || []
    empresas = e.data || []
    statusList = s.data || []
    usuarios = u.data || []
    console.log('Dados carregados:', { projetos: projetos.length, empresas: empresas.length, status: statusList.length, usuarios: usuarios.length })
  } catch (e) {
    console.error('Falha ao carregar dados:', e)
    throw e
  }
}

async function mostrarPagina(pagina) {
  document.getElementById('conteudo').innerHTML = '<div style="padding:30px;text-align:center;color:var(--text2);">⏳ Carregando...</div>'
  try {
    await carregarDados()
    if (pagina === 'dashboard') renderDashboard()
    else if (pagina === 'kanban') renderKanban()
    else if (pagina === 'tabela') renderTabela()
    else if (pagina === 'graficos') renderGraficos()
    else if (pagina === 'config') renderConfig()
  } catch (e) {
    document.getElementById('conteudo').innerHTML = '<div style="padding:30px;text-align:center;"><h3>❌ Erro</h3><p style="margin-top:8px;color:var(--text2);">' + e.message + '</p></div>'
  }
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════

  const totalPago = projetos.filter(p => p.pago === 'SIM').reduce((s, p) => s + parseValor(p.valor), 0)

  document.getElementById('conteudo').innerHTML = `
  <div class="kpi-row">
    <div class="kpi-card"><div class="label">Total Projetos</div><div class="valor">${total}</div></div>
    <div class="kpi-card"><div class="label">Valor Total</div><div class="valor">${fmtMoeda(totalValor)}</div></div>
    <div class="kpi-card"><div class="label">Em Aberto</div><div class="valor">${fmtMoeda(totalAberto)}</div></div>
    <div class="kpi-card"><div class="label">Recebido</div><div class="valor">${fmtMoeda(totalPago)}</div></div>
  </div>
  <div class="top-actions">
    <button class="btn btn-primary" onclick="abrirModalProj()">➕ Novo Projeto</button>
    <button class="btn btn-success" onclick="abrirModalExportar()">📊 Exportar</button>
  </div>
  <div class="tabela-wrap">
    <table>
      <thead><tr><th>Cliente</th><th>Valor</th><th>Status</th><th>Data</th><th>Pago</th><th>Drive</th></tr></thead>
      <tbody>
        ${projetos.slice(0, 10).map(p => `
          <tr>
            <td><strong>${p.cliente || '-'}</strong></td>
            <td>${fmtMoeda(parseValor(p.valor))}</td>
            <td>${p.status || '-'}</td>
            <td>${fmtData(p.data)}</td>
            <td>${p.pago === 'SIM' ? '✅' : '❌'}</td>
            <td>${p.drive_link ? '<a href="' + p.drive_link + '" target="_blank" style="color:var(--primaria);">📁</a>' : '-'}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`
}

// ═══════════════════════════════════════
// KANBAN
// ═══════════════════════════════════════
function renderKanban() {
  let html = '<div class="kanban-board">'
  statusList.forEach(s => {
    const cards = projetos.filter(p => p.status === s.nome)
    html += `
    <div class="kanban-col">
      <h3>${s.nome} <span>${cards.length}</span></h3>
      ${cards.map(p => `
        <div class="kanban-card" onclick="editarProjeto('${p.id}')">
          <div class="nome">${p.cliente || '-'}</div>
          <div class="info">${fmtMoeda(parseValor(p.valor))}</div>
          <div class="info">📅 ${fmtData(p.data_instalacao || p.data)}</div>
          <div class="info">⚡ ${p.potencia || '-'} kWp</div>
          ${p.pago === 'SIM' ? '<div class="tag" style="background:var(--sucesso);color:#fff;">Pago</div>' : ''}
        </div>`).join('')}
    </div>`
  })
  html += '</div>'
  document.getElementById('conteudo').innerHTML = html
}

// ═══════════════════════════════════════
// TABELA
// ═══════════════════════════════════════
function renderTabela() {
  document.getElementById('conteudo').innerHTML = `
  <div class="search-bar">
    <input id="filtroTabela" placeholder="🔍 Buscar por cliente..." oninput="filtrarTabela()">
  </div>
  <div class="tabela-wrap">
    <table>
      <thead><tr><th>Cliente</th><th>Empresa</th><th>Valor</th><th>TRT</th><th>Potência</th><th>Status</th><th>Data</th><th>Pago</th><th>Drive</th><th>Ações</th></tr></thead>
      <tbody id="corpoTabela"></tbody>
    </table>
  </div>`
  filtrarTabela()
}

function filtrarTabela() {
  const b = (document.getElementById('filtroTabela').value || '').toLowerCase()
  const f = projetos.filter(p => !b || (p.cliente || '').toLowerCase().includes(b) || (p.empresa || '').toLowerCase().includes(b))
  document.getElementById('corpoTabela').innerHTML = f.map(p => `
    <tr>
      <td><strong>${p.cliente || '-'}</strong></td>
      <td>${p.empresa || '-'}</td>
      <td>${fmtMoeda(parseValor(p.valor))}</td>
      <td>${fmtMoeda(parseValor(p.trt))}</td>
      <td>${p.potencia || '-'}</td>
      <td>${p.status || '-'}</td>
      <td>${fmtData(p.data)}</td>
      <td>${p.pago === 'SIM' ? '✅' : '❌'}</td>
      <td>${p.drive_link ? '<a href="' + p.drive_link + '" target="_blank" style="color:var(--primaria);">📁</a>' : '-'}</td>
      <td><button class="btn btn-sm btn-primary" onclick="editarProjeto('${p.id}')">✏️</button></td>
    </tr>`).join('')
}

// ═══════════════════════════════════════
// GRÁFICOS
// ═══════════════════════════════════════
function renderGraficos() {
  document.getElementById('conteudo').innerHTML = `
  <div class="chart-wrap"><h3>📊 Projetos por Status</h3><div class="chart-container"><canvas id="chartStatus"></canvas></div></div>
  <div class="chart-wrap"><h3>💰 Valores por Empresa</h3><div class="chart-container"><canvas id="chartEmpresas"></canvas></div></div>`
  
  const cores = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6']
  
  const ctx1 = document.getElementById('chartStatus')
  if (ctx1) {
    new Chart(ctx1, {
      type: 'bar',
      data: { labels: statusList.map(s => s.nome), datasets: [{ label: 'Projetos', data: statusList.map(s => projetos.filter(p => p.status === s.nome).length), backgroundColor: cores.slice(0, statusList.length) }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    })
  }
  
  const emp = {}
  projetos.forEach(p => { const e = p.empresa || 'Sem empresa'; emp[e] = (emp[e] || 0) + parseValor(p.valor) })
  const ctx2 = document.getElementById('chartEmpresas')
  if (ctx2) {
    new Chart(ctx2, {
      type: 'pie',
      data: { labels: Object.keys(emp), datasets: [{ data: Object.values(emp), backgroundColor: cores }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { tooltip: { callbacks: { label: ctx => ctx.label + ': ' + fmtMoeda(ctx.raw) } } } }
    })
  }
}

// ═══════════════════════════════════════
// CRUD PROJETOS
// ═══════════════════════════════════════
function abrirModalProj(dados) {
  projetoEditandoId = dados ? dados.id : null
  document.getElementById('tituloModalProj').textContent = dados ? '✏️ Editar Projeto' : '➕ Novo Projeto'
  
  const selEmp = document.getElementById('mpEmpresa')
  selEmp.innerHTML = '<option value="">Selecione</option>' + empresas.map(e => '<option value="' + e.nome + '">' + e.nome + '</option>').join('')
  
  const selSt = document.getElementById('mpStatus')
  selSt.innerHTML = statusList.map(s => '<option value="' + s.nome + '">' + s.nome + '</option>').join('')
  
  document.getElementById('mpCliente').value = dados ? dados.cliente || '' : ''
  document.getElementById('mpEmpresa').value = dados ? dados.empresa || '' : ''
  document.getElementById('mpData').value = dados ? fmtData(dados.data) : ''
  document.getElementById('mpDataInstalacao').value = dados ? fmtData(dados.data_instalacao) : ''
  document.getElementById('mpValor').value = dados ? parseValor(dados.valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) : ''
  document.getElementById('mpTrt').value = dados ? parseValor(dados.trt).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) : ''
  document.getElementById('mpPago').value = dados ? (dados.pago || 'NÃO') : 'NÃO'
  document.getElementById('mpPotencia').value = dados ? dados.potencia || '' : ''
  document.getElementById('mpStatus').value = dados ? dados.status || '' : (statusList[0] ? statusList[0].nome : '')
  
  document.getElementById('mpDocumentos').value = ''; document.getElementById('mpFotos').value = ''
  document.getElementById('mpDocList').textContent = 'Nenhum arquivo selecionado'
  document.getElementById('mpFotoList').textContent = 'Nenhuma foto selecionada'
  
  document.getElementById('mpDocumentos').onchange = function() {
    document.getElementById('mpDocList').textContent = Array.from(this.files).map(f => f.name).join(', ') || 'Nenhum'
  }
  document.getElementById('mpFotos').onchange = function() {
    document.getElementById('mpFotoList').textContent = Array.from(this.files).map(f => f.name).join(', ') || 'Nenhuma'
  }
  
  document.getElementById('modalProjeto').classList.add('show')
}

function fecharModalProj() { document.getElementById('modalProjeto').classList.remove('show'); projetoEditandoId = null }

async function salvarModalProj() {
  const cliente = document.getElementById('mpCliente').value.trim()
  if (!cliente) { mostrarToast('Cliente é obrigatório!', 'erro'); return }
  
  const dados = {
    cliente,
    empresa: document.getElementById('mpEmpresa').value,
    data: dataParaISO(document.getElementById('mpData').value) || new Date().toISOString().split('T')[0],
    data_instalacao: dataParaISO(document.getElementById('mpDataInstalacao').value),
    valor: parseValor(document.getElementById('mpValor').value),
    trt: parseValor(document.getElementById('mpTrt').value),
    pago: document.getElementById('mpPago').value,
    potencia: document.getElementById('mpPotencia').value,
    status: document.getElementById('mpStatus').value
  }
  
  try {
    let res
    if (projetoEditandoId) {
      res = await supabase.from('projetos').update(dados).eq('id', projetoEditandoId).select().single()
    } else {
      res = await supabase.from('projetos').insert(dados).select().single()
    }
    if (res.error) throw res.error
    
    mostrarToast('Projeto salvo! ✅', 'sucesso')
    
    if (res.data && res.data.id) {
      await enviarParaDrive(res.data.id, cliente, dados.empresa)
    }
    
    fecharModalProj()
    await carregarDados()
    const ativo = document.querySelector('.sidebar-item.ativo')
    if (ativo) mostrarPagina(ativo.dataset.page)
  } catch (e) {
    mostrarToast('Erro ao salvar: ' + e.message, 'erro')
  }
}

function editarProjeto(id) {
  const p = projetos.find(x => x.id === id)
  if (p) abrirModalProj(p)
}

// ═══════════════════════════════════════
// EXPORTAÇÃO
// ═══════════════════════════════════════
function abrirModalExportar() { document.getElementById('modalExportar').classList.add('show') }
function fecharModalExportar() { document.getElementById('modalExportar').classList.remove('show') }

function exportarPDF() {
  let lista = [...projetos]
  if (document.getElementById('expApenasAbertos').checked) lista = lista.filter(p => p.pago === 'NÃO')
  const incluirInst = document.getElementById('expIncluirInstalacao').checked
  
  const { jsPDF } = window.jspdf
  const doc = new jsPDF()
  doc.text('Relatório de Projetos', 14, 20)
  doc.setFontSize(10)
  doc.text('Gerado em: ' + new Date().toLocaleDateString('pt-BR'), 14, 28)
  
  const cols = ['Cliente', 'Valor', 'Status', 'Data', 'Pago']
  if (incluirInst) cols.push('Data Inst.')
  
  const rows = lista.map(p => {
    const r = [p.cliente || '-', fmtMoeda(parseValor(p.valor)), p.status || '-', fmtData(p.data), p.pago || 'NÃO']
    if (incluirInst) r.push(fmtData(p.data_instalacao))
    return r
  })
  
  doc.autoTable({ head: [cols], body: rows, startY: 34, styles: { fontSize: 8 } })
  
  const y = doc.lastAutoTable.finalY + 10
  doc.text('Total Geral: ' + fmtMoeda(lista.reduce((s,p) => s + parseValor(p.valor), 0)), 14, y)
  doc.text('Em Aberto: ' + fmtMoeda(lista.filter(p => p.pago === 'NÃO').reduce((s,p) => s + parseValor(p.valor), 0)), 14, y + 7)
  
  doc.save('relatorio_projetos.pdf')
  fecharModalExportar()
  mostrarToast('PDF gerado! 📄', 'sucesso')
}

function exportarExcel() {
  let lista = [...projetos]
  if (document.getElementById('expApenasAbertos').checked) lista = lista.filter(p => p.pago === 'NÃO')
  
  const dados = lista.map(p => ({
    Cliente: p.cliente, Empresa: p.empresa,
    Valor: parseValor(p.valor), TRT: parseValor(p.trt),
    Potencia_kWp: p.potencia, Data: p.data, Status: p.status, Pago: p.pago
  }))
  
  const ws = XLSX.utils.json_to_sheet(dados)
  const wb = XLSX.utils.book_new()
  XLSX.utils.book_append_sheet(wb, ws, 'Projetos')
  XLSX.writeFile(wb, 'relatorio_projetos.xlsx')
  fecharModalExportar()
  mostrarToast('Excel gerado! 📗', 'sucesso')
}

// CONFIG (USUÁRIOS)

function renderConfig() {
  if (usuarioAtual.funcao !== 'Administrador') {
    document.getElementById('conteudo').innerHTML = '<p style="padding:20px;">Apenas administradores podem acessar.</p>'
    return
  }
  
  document.getElementById('conteudo').innerHTML = `
  <h2>⚙️ Configurações</h2>
  <div class="config-section">
    <h3>👤 Cadastrar Usuário</h3>
    <div class="form-grid-3">
      <div class="grupo"><label>Nome</label><input id="cfgNome"></div>
      <div class="grupo"><label>Usuário</label><input id="cfgUser"></div>
      <div class="grupo"><label>Senha</label><input id="cfgPass" type="password"></div>
    </div>
    <div class="form-grid-2">
      <div class="grupo"><label>Função</label>
        <select id="cfgFuncao">
          <option>Administrador</option><option>Financeiro</option><option>Vendedor</option><option>Empresa</option>
        </select>
      </div>
      <div class="grupo"><label>Empresa</label><select id="cfgEmpresa"><option value="">Nenhuma</option>${empresas.map(e => '<option>' + e.nome + '</option>').join('')}</select></div>
    </div>
    <button class="btn btn-primary" onclick="cadastrarUsuario()">➕ Cadastrar</button>
  </div>
  <div class="config-section">
    <h3>👥 Usuários (${usuarios.length})</h3>
    ${usuarios.map(u => '<div class="user-row"><span style="flex:1;"><strong>' + u.nome + '</strong> (' + u.usuario + ')</span><span style="flex:1;font-size:12px;color:var(--text2);">' + (u.funcao || '-') + '</span><button class="btn btn-sm btn-danger" onclick="excluirUsuario(\'' + u.id + '\')">🗑️</button></div>').join('')}
  </div>
  <div class="config-section">
    <h3>🔗 Integração Google Drive</h3>
    <p style="font-size:13px;">Status: <span style="color:var(--sucesso);font-weight:600;">✅ Ativo</span></p>
    <p style="font-size:12px;color:var(--text2);">Arquivos enviados automaticamente ao Salvar.</p>
  </div>`
}

async function cadastrarUsuario() {
  const n = document.getElementById('cfgNome').value.trim()
  const u = document.getElementById('cfgUser').value.trim()
  const p = document.getElementById('cfgPass').value.trim()
  if (!n || !u || !p) { mostrarToast('Preencha todos os campos!', 'erro'); return }
  try {
    await supabase.from('usuarios').insert({
      nome: n, usuario: u, senha: p,
      funcao: document.getElementById('cfgFuncao').value,
      empresa: document.getElementById('cfgEmpresa').value
    })
    mostrarToast('Usuário cadastrado! ✅', 'sucesso')
    document.getElementById('cfgNome').value = ''
    document.getElementById('cfgUser').value = ''
    document.getElementById('cfgPass').value = ''
    await carregarDados(); renderConfig()
  } catch (e) { mostrarToast('Erro: ' + e.message, 'erro') }
}

async function excluirUsuario(id) {
  if (!confirm('Excluir usuário?')) return
  if (id === usuarioAtual.id) { mostrarToast('Não pode excluir a si mesmo!', 'erro'); return }
  try {
    await supabase.from('usuarios').delete().eq('id', id)
    mostrarToast('Usuário excluído!', 'sucesso')
    await carregarDados(); renderConfig()
  } catch (e) { mostrarToast('Erro: ' + e.message, 'erro') }
}
